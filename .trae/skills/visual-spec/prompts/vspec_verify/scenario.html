<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scenario Review</title>
    <style>
      :root {
        --bg: #f3f4f6;
        --panel: #ffffff;
        --panel-2: rgba(17, 24, 39, 0.03);
        --border: rgba(17, 24, 39, 0.12);
        --text: #111827;
        --muted: rgba(17, 24, 39, 0.64);
        --muted-2: rgba(17, 24, 39, 0.54);
        --primary: #0b74d1;
        --primary-2: rgba(11, 116, 209, 0.10);
        --danger: #dc2626;
        --warn: #d97706;
        --ok: #16a34a;
        --shadow: 0 10px 26px rgba(17, 24, 39, 0.08);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        color: var(--text);
        background: var(--bg);
      }
      a {
        color: inherit;
      }
      .app {
        height: 100%;
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 18px;
        padding: 18px;
      }
      .panel,
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: var(--shadow);
        overflow: hidden;
        min-width: 0;
        min-height: 0;
      }
      .langSelect,
      .input,
      .textArea {
        border-radius: 10px;
        border: 1px solid var(--border);
        background: #ffffff;
        color: var(--text);
        padding: 8px 10px;
        font-size: 13px;
        outline: none;
      }
      .langSelect {
        padding: 6px 10px;
        font-size: 12px;
      }
      .sidebar {
        display: grid;
        grid-template-rows: auto 1fr;
      }
      .sideHeader {
        margin: 12px;
        padding: 14px 14px 12px;
        border-radius: 10px;
        background: var(--primary);
        color: #ffffff;
      }
      .sideTitle {
        font-weight: 800;
        font-size: 16px;
        letter-spacing: 0.2px;
      }
      .sideSub {
        margin-top: 6px;
        font-size: 12px;
        opacity: 0.92;
      }
      .sideBody {
        padding: 0 12px 12px;
        min-height: 0;
      }
      .list {
        overflow: auto;
        min-height: 0;
      }
      .item {
        padding: 12px 12px;
        border: 1px solid rgba(17, 24, 39, 0.10);
        border-radius: 10px;
        background: #ffffff;
        display: grid;
        gap: 8px;
        cursor: pointer;
        box-shadow: 0 8px 18px rgba(17, 24, 39, 0.06);
        margin-bottom: 10px;
      }
      .item:hover {
        border-color: rgba(11, 116, 209, 0.28);
      }
      .itemActive {
        border-color: rgba(11, 116, 209, 0.55);
        background: rgba(11, 116, 209, 0.08);
      }
      .itemTitle {
        display: flex;
        align-items: baseline;
        gap: 8px;
        min-width: 0;
      }
      .itemId {
        font-weight: 700;
        font-size: 12px;
        color: rgba(11, 116, 209, 0.95);
      }
      .itemName {
        font-size: 14px;
        font-weight: 700;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .itemMeta {
        font-size: 12px;
        color: var(--muted);
      }
      .content {
        display: grid;
        min-height: 0;
      }
      .cardHeader {
        padding: 14px 16px;
        border-bottom: 1px solid rgba(17, 24, 39, 0.10);
        display: flex;
        align-items: center;
        gap: 12px;
        justify-content: space-between;
        flex-wrap: wrap;
      }
      .cardTitle {
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 0.2px;
      }
      .cardHeaderRight {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .cardBody {
        padding: 14px 16px 16px;
        overflow: auto;
        min-height: 0;
      }
      .badge {
        font-size: 12px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(17, 24, 39, 0.12);
        background: rgba(17, 24, 39, 0.04);
        color: rgba(17, 24, 39, 0.74);
        white-space: nowrap;
      }
      .badgeOk {
        border-color: rgba(22, 163, 74, 0.24);
        background: rgba(22, 163, 74, 0.10);
        color: rgba(22, 163, 74, 0.95);
      }
      .badgeWarn {
        border-color: rgba(217, 119, 6, 0.24);
        background: rgba(217, 119, 6, 0.10);
        color: rgba(217, 119, 6, 0.95);
      }
      .badgeDanger {
        border-color: rgba(220, 38, 38, 0.24);
        background: rgba(220, 38, 38, 0.10);
        color: rgba(220, 38, 38, 0.95);
      }
      .segmented {
        display: inline-flex;
        border: 1px solid rgba(17, 24, 39, 0.16);
        border-radius: 999px;
        overflow: hidden;
        background: rgba(17, 24, 39, 0.03);
      }
      .segBtn {
        appearance: none;
        border: none;
        background: transparent;
        padding: 8px 12px;
        font-size: 12px;
        cursor: pointer;
        color: rgba(17, 24, 39, 0.62);
        border-right: 1px solid rgba(17, 24, 39, 0.10);
        user-select: none;
      }
      .segBtn:last-child {
        border-right: none;
      }
      .segBtnActive {
        background: rgba(11, 116, 209, 0.10);
        color: rgba(11, 116, 209, 0.96);
      }
      .summaryGrid {
        display: grid;
        grid-template-columns: 140px 1fr 160px 1fr;
        border: 1px solid rgba(17, 24, 39, 0.10);
        border-radius: 10px;
        overflow: hidden;
        background: rgba(17, 24, 39, 0.02);
      }
      .summaryCell {
        padding: 12px 12px;
        font-size: 12px;
        border-bottom: 1px solid rgba(17, 24, 39, 0.08);
        border-right: 1px solid rgba(17, 24, 39, 0.08);
        background: #ffffff;
      }
      .summaryCell:nth-child(4n) {
        border-right: none;
      }
      .summaryCell:nth-last-child(-n + 4) {
        border-bottom: none;
      }
      .summaryKey {
        color: rgba(17, 24, 39, 0.62);
        margin-bottom: 4px;
      }
      .summaryVal {
        font-size: 13px;
        font-weight: 700;
        color: rgba(17, 24, 39, 0.90);
        word-break: break-word;
      }
      .sectionTitle {
        margin-top: 14px;
        font-size: 14px;
        font-weight: 800;
      }
      .steps {
        margin-top: 10px;
        display: grid;
        gap: 10px;
      }
      .step {
        border: 1px solid rgba(17, 24, 39, 0.10);
        background: #ffffff;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 12px;
      }
      .stepLeft {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }
      .stepNo {
        width: 26px;
        height: 26px;
        border-radius: 999px;
        background: var(--primary);
        color: #ffffff;
        font-weight: 800;
        display: grid;
        place-items: center;
        flex: 0 0 auto;
        font-size: 12px;
      }
      .stepTitle {
        font-size: 13px;
        font-weight: 800;
        color: rgba(17, 24, 39, 0.92);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .stepSub {
        margin-top: 4px;
        font-size: 12px;
        color: rgba(17, 24, 39, 0.62);
      }
      .stepRight {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .btn {
        appearance: none;
        border: 1px solid rgba(17, 24, 39, 0.14);
        background: rgba(17, 24, 39, 0.04);
        color: rgba(17, 24, 39, 0.88);
        padding: 8px 12px;
        border-radius: 10px;
        font-size: 12px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        white-space: nowrap;
      }
      .btnPrimary {
        background: rgba(11, 116, 209, 0.10);
        border-color: rgba(11, 116, 209, 0.26);
        color: rgba(11, 116, 209, 0.98);
      }
      .btn[aria-disabled="true"] {
        opacity: 0.45;
        pointer-events: none;
      }
      .noteBox {
        margin-top: 14px;
        display: grid;
        gap: 8px;
      }
      .noteLabel {
        font-size: 12px;
        color: rgba(17, 24, 39, 0.62);
      }
      .textArea {
        width: 100%;
        min-height: 92px;
        resize: vertical;
        line-height: 1.4;
      }
      .empty {
        padding: 12px;
        border: 1px dashed rgba(17, 24, 39, 0.22);
        border-radius: 10px;
        color: var(--muted);
        background: rgba(17, 24, 39, 0.02);
      }
      @media (max-width: 980px) {
        .app {
          grid-template-columns: 1fr;
          grid-template-rows: 360px 1fr;
          padding: 12px;
        }
        .summaryGrid {
          grid-template-columns: 140px 1fr;
        }
        .summaryCell:nth-child(2n) {
          border-right: none;
        }
        .summaryCell:nth-last-child(-n + 2) {
          border-bottom: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="panel sidebar">
        <div class="sideHeader">
          <div class="sideTitle" id="uiScenarios">Scenarios</div>
          <div class="sideSub" id="uiScenariosSub">Select a scenario to review steps</div>
        </div>
        <div class="sideBody">
          <div id="sceneList" class="list" role="listbox"></div>
        </div>
      </div>

      <div class="content">
        <div class="card">
          <div class="cardHeader">
            <div id="uiScenarioReview" class="cardTitle">Scenario Review</div>
            <div class="cardHeaderRight">
              <select id="langSelect" class="langSelect">
                <option value="en">English</option>
                <option value="zh-CN">中文</option>
                <option value="ja">日本語</option>
              </select>
              <span id="generatedAt" class="badge">-</span>
              <span id="statusChip" class="badge"></span>
              <div id="statusGroup" class="segmented" role="radiogroup" aria-label="Confirmation status">
                <button class="segBtn" type="button" data-status="pending" id="uiPending"></button>
                <button class="segBtn" type="button" data-status="confirmed" id="uiConfirmed"></button>
                <button class="segBtn" type="button" data-status="need_change" id="uiNeedChange"></button>
              </div>
            </div>
          </div>
          <div class="cardBody">
            <div id="emptyState" class="empty"></div>
            <div id="sceneView" style="display: none">
              <div id="sceneTitle" class="cardTitle" style="font-size: 16px; margin: 0 0 12px">-</div>

              <div class="summaryGrid" aria-label="Scenario summary">
                <div class="summaryCell">
                  <div class="summaryKey" id="uiSceneIdKey"></div>
                  <div class="summaryVal" id="sceneIdVal">-</div>
                </div>
                <div class="summaryCell">
                  <div class="summaryKey" id="uiParticipantsKey"></div>
                  <div class="summaryVal" id="sceneParticipantsVal">-</div>
                </div>
                <div class="summaryCell">
                  <div class="summaryKey" id="uiTriggerKey"></div>
                  <div class="summaryVal" id="sceneTriggerVal">-</div>
                </div>
                <div class="summaryCell">
                  <div class="summaryKey" id="uiExpectedKey"></div>
                  <div class="summaryVal" id="sceneExpectedVal">-</div>
                </div>
              </div>

              <div class="sectionTitle" id="uiSteps"></div>
              <div id="nodes" class="steps"></div>

              <div class="noteBox">
                <div class="noteLabel" id="uiNotes"></div>
                <textarea id="note" class="textArea"></textarea>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        const i18n = {
          "en": {
            title: "Scenario Review",
            scenarios: "Scenarios",
            scenariosSub: "Select a scenario to review steps",
            scenarioReview: "Scenario Review",
            pending: "Pending",
            confirmed: "Confirmed",
            need_change: "Needs change",
            notes: "Notes (optional):",
            notePlaceholder: "Record changes, clarifications, risks, etc.",
            emptyNoData: "No scenario data loaded. Ensure scenario.json exists next to /scenario.html and access it via a dev server.",
            emptyNoNodes: "This scenario does not provide a node chain. Fill it from scenarios.md / scenario_details during generation.",
            sceneIdKey: "Scenario ID",
            participantsKey: "Participants",
            triggerKey: "Trigger",
            expectedKey: "Expected result",
            steps: "Steps",
            openPrototype: "View prototype",
            openWeb: "Web",
            openMobile: "Mobile"
          },
          "zh-CN": {
            title: "场景确认",
            scenarios: "场景列表",
            scenariosSub: "选择场景查看详细步骤",
            scenarioReview: "场景确认",
            pending: "待确认",
            confirmed: "已确认",
            need_change: "需修改",
            notes: "备注（可选）：",
            notePlaceholder: "记录需要修改的点、补充说明、风险等",
            emptyNoData: "未加载任何场景数据。请确保生成时已将 scenario.json 写入同目录，并通过开发服务器访问。",
            emptyNoNodes: "该场景未提供节点链条数据。请在生成时从 scenarios.md / scenario_details 补齐。",
            sceneIdKey: "场景ID",
            participantsKey: "参与者",
            triggerKey: "触发条件",
            expectedKey: "预期结果",
            steps: "流程步骤",
            openPrototype: "查看原型",
            openWeb: "Web",
            openMobile: "Mobile"
          },
          "ja": {
            title: "シナリオ確認",
            scenarios: "シナリオ一覧",
            scenariosSub: "シナリオを選択して手順を確認",
            scenarioReview: "シナリオ確認",
            pending: "未確認",
            confirmed: "確認済",
            need_change: "要修正",
            notes: "備考（任意）：",
            notePlaceholder: "修正点、補足、リスクなどを記録",
            emptyNoData: "シナリオデータが読み込まれていません。scenario.json が同じディレクトリにあることを確認し、開発サーバー経由でアクセスしてください。",
            emptyNoNodes: "このシナリオにはノードチェーンデータがありません。生成時に scenarios.md / scenario_details から補完してください。",
            sceneIdKey: "シナリオID",
            participantsKey: "参加者",
            triggerKey: "トリガー",
            expectedKey: "期待結果",
            steps: "手順",
            openPrototype: "原型を見る",
            openWeb: "Web",
            openMobile: "Mobile"
          }
        };

        let currentLang = "en";

        function t(key, params) {
          let text = i18n[currentLang][key] || i18n["en"][key] || key;
          if (params) {
            for (const k in params) {
              text = text.replace(`{${k}}`, params[k]);
            }
          }
          return text;
        }

        const LS_KEY = "__vspec_scenario_confirmations__";

        function safeJsonParse(text, fallback) {
          try { return JSON.parse(text); } catch { return fallback; }
        }

        function nowIso() { return new Date().toISOString(); }

        async function loadScenarioData() {
          const url = "./scenario.json";
          const res = await fetch(url, { cache: "no-store" });
          if (!res.ok) throw new Error(`Failed to load ${url}: ${res.status}`);
          return await res.json();
        }

        function normalizeNode(node) {
          const type = String(node?.type || "").trim();
          const label = String(node?.label || node?.name || "").trim();
          const route = String(node?.route || "").trim();
          const mobileRoute = String(node?.mobileRoute || "").trim();
          const pageName = String(node?.pageName || "").trim();

          const defaultRouteMap = {
            apply: "/apply",
            approve: "/approve",
            "execute-start": "/execute",
            "execute-end": "/execute",
            execute: "/execute",
            change: "/change",
            cancel: "/cancel",
          };

          return {
            type,
            label: label || type || "-",
            route: route || defaultRouteMap[type] || "",
            mobileRoute,
            pageName,
          };
        }

        function normalizeScenario(scene) {
          const id = String(scene?.id || scene?.no || scene?.code || "").trim();
          const name = String(scene?.name || scene?.title || "").trim();
          const participantsRaw = scene?.participants || scene?.actors || scene?.roles || scene?.users;
          const participants = Array.isArray(participantsRaw)
            ? participantsRaw.map((x) => String(x || "").trim()).filter(Boolean).join("、")
            : String(participantsRaw || "").trim();
          const trigger = String(scene?.trigger || scene?.condition || scene?.when || scene?.on || "").trim();
          const expected = String(scene?.expected || scene?.expectation || scene?.result || "").trim();
          const nodes = Array.isArray(scene?.nodes) ? scene.nodes.map(normalizeNode) : [];
          return { id, name, participants, trigger, expected, nodes };
        }

        function getStatusLabel(status) {
          if (status === "confirmed") return t("confirmed");
          if (status === "need_change") return t("need_change");
          return t("pending");
        }

        function getStatusChipClass(status) {
          if (status === "confirmed") return "badge badgeOk";
          if (status === "need_change") return "badge badgeDanger";
          return "badge badgeWarn";
        }

        function loadStore() { return safeJsonParse(localStorage.getItem(LS_KEY) || "{}", {}); }
        function saveStore(store) { localStorage.setItem(LS_KEY, JSON.stringify(store)); }

        const $langSelect = document.getElementById("langSelect");
        const $generatedAt = document.getElementById("generatedAt");
        const $sceneList = document.getElementById("sceneList");
        const $emptyState = document.getElementById("emptyState");
        const $sceneView = document.getElementById("sceneView");
        const $sceneTitle = document.getElementById("sceneTitle");
        const $statusChip = document.getElementById("statusChip");
        const $statusGroup = document.getElementById("statusGroup");
        const $note = document.getElementById("note");
        const $nodes = document.getElementById("nodes");
        const $sceneIdVal = document.getElementById("sceneIdVal");
        const $sceneParticipantsVal = document.getElementById("sceneParticipantsVal");
        const $sceneTriggerVal = document.getElementById("sceneTriggerVal");
        const $sceneExpectedVal = document.getElementById("sceneExpectedVal");

        let scenarios = [];
        let store = loadStore();
        let activeId = "";

        function getSceneStore(id) {
          const v = store[id] || {};
          const status = v.status === "confirmed" || v.status === "need_change" ? v.status : "pending";
          const note = typeof v.note === "string" ? v.note : "";
          return { status, note };
        }

        function setSceneStore(id, partial) {
          const prev = getSceneStore(id);
          store[id] = { ...prev, ...partial, updatedAt: nowIso() };
          saveStore(store);
        }

        function updateStaticUi() {
          document.title = t("title");
          document.getElementById("uiScenarios").textContent = t("scenarios");
          document.getElementById("uiScenariosSub").textContent = t("scenariosSub");
          document.getElementById("uiScenarioReview").textContent = t("scenarioReview");
          document.getElementById("uiPending").textContent = t("pending");
          document.getElementById("uiConfirmed").textContent = t("confirmed");
          document.getElementById("uiNeedChange").textContent = t("need_change");
          document.getElementById("uiNotes").textContent = t("notes");
          $note.placeholder = t("notePlaceholder");
          document.getElementById("uiSceneIdKey").textContent = t("sceneIdKey");
          document.getElementById("uiParticipantsKey").textContent = t("participantsKey");
          document.getElementById("uiTriggerKey").textContent = t("triggerKey");
          document.getElementById("uiExpectedKey").textContent = t("expectedKey");
          document.getElementById("uiSteps").textContent = t("steps");
        }

        function renderList() {
          const items = scenarios;
          $sceneList.innerHTML = "";

          for (const s of items) {
            const { status } = getSceneStore(s.id);
            const row = document.createElement("div");
            row.className = "item" + (s.id === activeId ? " itemActive" : "");
            row.addEventListener("click", () => {
              activeId = s.id;
              render();
            });

            const title = document.createElement("div");
            title.className = "itemTitle";

            const name = document.createElement("div");
            name.className = "itemName";
            name.textContent = s.name || "-";

            title.appendChild(name);

            const meta = document.createElement("div");
            meta.className = "itemMeta";
            const idText = s.id ? `ID: ${s.id}` : "ID: -";
            meta.textContent = s.participants ? `${idText} | ${s.participants}` : idText;

            const chip = document.createElement("div");
            chip.className = getStatusChipClass(status);
            chip.textContent = getStatusLabel(status);

            row.appendChild(title);
            row.appendChild(meta);
            row.appendChild(chip);
            $sceneList.appendChild(row);
          }
        }

        function setStatusUi(status) {
          $statusChip.className = getStatusChipClass(status);
          $statusChip.textContent = getStatusLabel(status);
          for (const el of Array.from($statusGroup.querySelectorAll(".segBtn"))) {
            const isActive = el.getAttribute("data-status") === status;
            el.className = "segBtn" + (isActive ? " segBtnActive" : "");
          }
        }

        function renderNodes(scene) {
          $nodes.innerHTML = "";
          if (!scene.nodes.length) {
            const empty = document.createElement("div");
            empty.className = "empty";
            empty.textContent = t("emptyNoNodes");
            $nodes.appendChild(empty);
            return;
          }

          for (let idx = 0; idx < scene.nodes.length; idx++) {
            const n = scene.nodes[idx];
            const step = document.createElement("div");
            step.className = "step";

            const left = document.createElement("div");
            left.className = "stepLeft";

            const no = document.createElement("div");
            no.className = "stepNo";
            no.textContent = String(idx + 1);

            const textWrap = document.createElement("div");
            textWrap.style.minWidth = "0";

            const title = document.createElement("div");
            title.className = "stepTitle";
            title.textContent = n.label || n.pageName || n.type || "-";

            const sub = document.createElement("div");
            sub.className = "stepSub";
            const parts = [];
            if (n.type) parts.push(n.type);
            if (n.pageName && n.pageName !== title.textContent) parts.push(n.pageName);
            const route = n.route || n.mobileRoute || "";
            if (route) parts.push(route);
            sub.textContent = parts.join(" · ");

            textWrap.appendChild(title);
            textWrap.appendChild(sub);
            left.appendChild(no);
            left.appendChild(textWrap);

            const right = document.createElement("div");
            right.className = "stepRight";

            const routeWeb = String(n.route || "").trim();
            const routeMobile = String(n.mobileRoute || "").trim();

            if (routeWeb && routeMobile && routeWeb !== routeMobile) {
              const a1 = document.createElement("a");
              a1.className = "btn btnPrimary";
              a1.textContent = `${t("openPrototype")} (${t("openWeb")})`;
              a1.href = routeWeb;
              a1.target = "_blank";
              a1.rel = "noopener";

              const a2 = document.createElement("a");
              a2.className = "btn btnPrimary";
              a2.textContent = `${t("openPrototype")} (${t("openMobile")})`;
              a2.href = routeMobile;
              a2.target = "_blank";
              a2.rel = "noopener";

              right.appendChild(a1);
              right.appendChild(a2);
            } else {
              const a = document.createElement("a");
              a.className = "btn btnPrimary";
              a.textContent = t("openPrototype");
              const href = routeWeb || routeMobile;
              a.href = href ? href : "javascript:void(0)";
              a.target = "_blank";
              a.rel = "noopener";
              if (!href) a.setAttribute("aria-disabled", "true");
              right.appendChild(a);
            }

            step.appendChild(left);
            step.appendChild(right);
            $nodes.appendChild(step);
          }
        }

        function escapeHtml(s) {
          return String(s)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
        }

        function renderScene() {
          const scene = scenarios.find((s) => s.id === activeId) || scenarios[0];
          if (!scene) return;

          const saved = getSceneStore(scene.id);
          $sceneTitle.textContent = scene.name ? `${scene.name}` : (scene.id || "-");
          $sceneIdVal.textContent = scene.id || "-";
          $sceneParticipantsVal.textContent = scene.participants || "-";
          $sceneTriggerVal.textContent = scene.trigger || "-";
          $sceneExpectedVal.textContent = scene.expected || "-";
          $note.value = saved.note || "";
          setStatusUi(saved.status);
          renderNodes(scene);
        }

        function render() {
          updateStaticUi();
          if (!scenarios.length) {
             $emptyState.textContent = t("emptyNoData");
             return;
          }
          renderList();
          $emptyState.style.display = "none";
          $sceneView.style.display = "block";
          renderScene();
        }

        $langSelect.addEventListener("change", () => {
          currentLang = $langSelect.value;
          document.documentElement.lang = currentLang === "zh-CN" ? "zh-CN" : currentLang;
          render();
        });

        $statusGroup.addEventListener("click", (e) => {
          const target = e.target;
          if (!(target instanceof HTMLElement)) return;
          const st = target.getAttribute("data-status");
          if (!st) return;
          if (!activeId) return;
          setSceneStore(activeId, { status: st });
          render();
        });

        $note.addEventListener("change", () => {
          if (!activeId) return;
          setSceneStore(activeId, { note: $note.value || "" });
          renderList();
        });

        (async function init() {
          const navLang = navigator.language || "";
          if (navLang.startsWith("zh")) currentLang = "zh-CN";
          else if (navLang.startsWith("ja")) currentLang = "ja";
          else currentLang = "en";
          $langSelect.value = currentLang;
          document.documentElement.lang = currentLang === "zh-CN" ? "zh-CN" : currentLang;

          try {
            const data = await loadScenarioData();
            const scenariosRaw = Array.isArray(data?.scenarios) ? data.scenarios : [];
            scenarios = scenariosRaw.map(normalizeScenario).filter((s) => s.id || s.name);
            activeId = scenarios.length ? scenarios[0].id : "";
            $generatedAt.textContent = data?.meta?.generatedAt ? String(data.meta.generatedAt) : "-";

            if (scenarios.length) {
              $emptyState.style.display = "none";
              $sceneView.style.display = "block";
              render();
            } else {
              updateStaticUi();
              $emptyState.textContent = t("emptyNoData");
              $emptyState.style.display = "block";
              $sceneView.style.display = "none";
            }
          } catch (err) {
            $generatedAt.textContent = "-";
            updateStaticUi();
            $emptyState.textContent = t("emptyNoData");
            $emptyState.style.display = "block";
            $sceneView.style.display = "none";
          }
        })();
      })();
    </script>
  </body>
</html>
