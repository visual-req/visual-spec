<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title id="uiTitle">QC Report</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif; margin: 0; color: #111827; background: #f9fafb; }
      header { padding: 14px 18px; background: #111827; color: #fff; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
      header h1 { font-size: 14px; margin: 0; font-weight: 600; }
      header .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      button { font-size: 12px; padding: 7px 10px; border-radius: 10px; border: 1px solid #374151; background: #111827; color: #fff; cursor: pointer; }
      button.secondary { background: #fff; color: #111827; border-color: #d1d5db; }
      button:disabled { opacity: 0.6; cursor: not-allowed; }

      main { padding: 16px; max-width: 1200px; margin: 0 auto; }
      .panel { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; overflow: hidden; }
      .panel .hd { padding: 12px 14px; border-bottom: 1px solid #e5e7eb; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
      
      .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
      label { font-size: 12px; color: #374151; }
      select, input[type="text"] { font-size: 12px; padding: 6px 8px; border: 1px solid #d1d5db; border-radius: 8px; background: #fff; color: #111827; }
      .pill { font-size: 12px; padding: 4px 8px; border-radius: 999px; background: #f3f4f6; border: 1px solid #e5e7eb; color: #111827; }
      .pill.P0 { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }
      .pill.P1 { background: #ffedd5; color: #9a3412; border-color: #fdba74; }
      .pill.P2 { background: #fef3c7; color: #9a3412; border-color: #fcd34d; }
      
      .stats { padding: 10px 14px; border-bottom: 1px solid #e5e7eb; background: #f9fafb; display: flex; gap: 10px; align-items: center; justify-content: space-between; flex-wrap: wrap; }
      .stats .left { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      .stats .right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      .count { font-size: 12px; color: #374151; }
      .count strong { color: #111827; }
      
      .k { font-size: 12px; color: #374151; font-weight: 600; margin: 12px 0 6px; }
      .v { font-size: 12px; color: #111827; white-space: pre-wrap; word-break: break-word; background: #f9fafb; padding: 8px; border-radius: 6px; border: 1px solid #e5e7eb; }
      .v.danger { background: #fef2f2; border-color: #fecaca; }
      .empty { padding: 24px; color: #6b7280; font-size: 13px; text-align: center; }

      .listWrap { padding: 8px 10px 12px; }
      details.item { border: 1px solid #e5e7eb; border-radius: 10px; overflow: hidden; margin: 10px 4px; background: #fff; }
      details.item[open] { border-color: #c7d2fe; box-shadow: 0 1px 0 rgba(17,24,39,0.04); }
      summary.itemSum { list-style: none; cursor: pointer; padding: 10px 12px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; background: #fff; }
      summary.itemSum::-webkit-details-marker { display: none; }
      .sumLeft { min-width: 0; display: flex; gap: 10px; align-items: flex-start; }
      .sumMain { min-width: 0; }
      .sumTitle { font-size: 12px; color: #111827; font-weight: 600; line-height: 1.4; word-break: break-word; }
      .sumMeta { margin-top: 4px; font-size: 12px; color: #6b7280; word-break: break-word; }
      .sumRight { flex: 0 0 auto; display: flex; gap: 6px; align-items: center; }
      .tag { font-size: 12px; padding: 3px 8px; border-radius: 999px; border: 1px solid #e5e7eb; background: #fff; color: #111827; }
      .tag.muted { background: #f9fafb; color: #374151; }
      .itemBody { padding: 12px; border-top: 1px solid #e5e7eb; background: #fff; }
      .kv { display: grid; grid-template-columns: 160px 1fr; gap: 10px 12px; }
      .kv .k { margin: 0; }
      .kv .v { margin: 0; }
      .kwWrap { background: transparent; border: none; padding: 0; }
      .kwWrap .pill { margin-right: 6px; margin-bottom: 6px; display: inline-block; }
      
      .pagination { padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #e5e7eb; background: #f9fafb; }
      .pagination span { font-size: 12px; color: #374151; }
    </style>
  </head>
  <body>
    <div style="position: absolute; top: 12px; right: 16px; z-index: 100;">
      <select id="globalLangSelect" style="background: rgba(255,255,255,0.9); border: 1px solid #d1d5db; color: #111827; border-radius: 6px; padding: 4px 6px; font-size: 12px; outline: none;">
        <option value="en">English</option>
        <option value="zh-CN">中文</option>
        <option value="ja">日本語</option>
      </select>
    </div>
    <header>
      <h1 id="uiH1">QC Report</h1>
      <div class="actions">
        <button id="loadBtn" class="secondary"><span id="uiLoad">Reload JSON</span></button>
      </div>
    </header>
    <main>
      <section class="panel">
        <div class="hd">
          <span class="pill" id="metaInfo">Not loaded</span>
          <div class="row" style="margin-left:auto">
            <label id="uiType">Type</label>
            <select id="typeFilter">
              <option value="" id="uiAll1">All</option>
            </select>
            <label id="uiSeverity">Severity</label>
            <select id="severityFilter">
              <option value="" id="uiAll2">All</option>
              <option value="P0">P0</option>
              <option value="P1">P1</option>
              <option value="P2">P2</option>
            </select>
            <label id="uiKeyword">Keyword</label>
            <select id="keywordFilter">
              <option value="" id="uiAll3">All</option>
            </select>
            <label id="uiPath">Path</label>
            <input id="pathQ" type="text" placeholder="e.g. /specs/functions" />
            <label id="uiSearch">Search</label>
            <input id="q" type="text" placeholder="keywords / text" />
          </div>
        </div>
        <div class="stats">
          <div class="left">
            <span class="count" id="countInfo">0 / 0</span>
          </div>
          <div class="right">
            <button id="resetBtn" class="secondary"><span id="uiReset">Reset</span></button>
            <button id="expandBtn" class="secondary"><span id="uiExpandAll">Expand all</span></button>
            <button id="collapseBtn" class="secondary"><span id="uiCollapseAll">Collapse all</span></button>
          </div>
        </div>
        <div class="listWrap" id="listWrap">
          <div class="empty" id="emptyList">Click Reload JSON to load qc_report.json</div>
        </div>
        <div class="pagination">
          <span id="pageInfo">Page 1 of 1</span>
          <div class="actions">
            <label id="uiPageSize">Page size</label>
            <select id="pageSize">
              <option value="10">10</option>
              <option value="25">25</option>
              <option value="50" selected>50</option>
              <option value="100">100</option>
            </select>
            <button id="prevBtn" class="secondary">Prev</button>
            <button id="nextBtn" class="secondary">Next</button>
          </div>
        </div>
      </section>
    </main>
    <script>
      const i18n = {
        en: {
          title: "QC Report",
          load: "Reload JSON",
          type: "Type",
          severity: "Severity",
          keyword: "Keyword",
          path: "Path",
          search: "Search",
          searchPlaceholder: "keywords / text",
          pathPlaceholder: "e.g. /specs/functions",
          emptyList: "Click Reload JSON to load qc_report.json",
          all: "All",
          metaLoaded: "Loaded {0} issues ({1})",
          metaEmpty: "No issues found. Quality check passed!",
          pageInfo: "Page {0} of {1}",
          prev: "Prev",
          next: "Next",
          pageSize: "Page size",
          reset: "Reset",
          expandAll: "Expand all",
          collapseAll: "Collapse all",
          countInfo: "{0} shown / {1} total",
          kStandard: "Standard Source",
          kExcerpt: "Excerpt",
          kNonconformance: "Nonconformance",
          kFix: "Fix Suggestion",
          kKeywords: "Keywords",
          kCheckpoint: "Checkpoint",
          kType: "Type",
          kSeverity: "Severity",
          kLocation: "Location",
          noIssues: "No issues found matching criteria."
        },
        "zh-CN": {
          title: "质量检查报告",
          load: "重新加载 JSON",
          type: "问题类型",
          severity: "严重程度",
          keyword: "关键词",
          path: "路径",
          search: "搜索",
          searchPlaceholder: "关键词 / 文本",
          pathPlaceholder: "例如 /specs/functions",
          emptyList: "请点击重新加载 JSON 读取 qc_report.json",
          all: "全部",
          metaLoaded: "已加载 {0} 个问题（行业：{1}）",
          metaEmpty: "未发现问题，质量检查通过！",
          pageInfo: "第 {0} 页，共 {1} 页",
          prev: "上一页",
          next: "下一页",
          pageSize: "每页条数",
          reset: "重置",
          expandAll: "全部展开",
          collapseAll: "全部折叠",
          countInfo: "展示 {0} 条 / 总计 {1} 条",
          kStandard: "检查标准来源",
          kExcerpt: "问题原文片段",
          kNonconformance: "不符合说明",
          kFix: "修复建议",
          kKeywords: "关键词",
          kCheckpoint: "检查点",
          kType: "类型",
          kSeverity: "严重程度",
          kLocation: "文件位置",
          noIssues: "未找到符合条件的问题。"
        },
        ja: {
          title: "品質検査レポート",
          load: "JSONを再読み込み",
          type: "タイプ",
          severity: "重要度",
          keyword: "キーワード",
          path: "パス",
          search: "検索",
          searchPlaceholder: "キーワード / テキスト",
          pathPlaceholder: "例: /specs/functions",
          emptyList: "「JSONを再読み込み」をクリックして qc_report.json を読み込みます",
          all: "すべて",
          metaLoaded: "{0} 件の問題を読み込みました (業界: {1})",
          metaEmpty: "問題は見つかりませんでした。品質チェック合格！",
          pageInfo: "{0} / {1} ページ",
          prev: "前へ",
          next: "次へ",
          pageSize: "件数/ページ",
          reset: "リセット",
          expandAll: "すべて展開",
          collapseAll: "すべて折りたたむ",
          countInfo: "{0} 件表示 / 全 {1} 件",
          kStandard: "基準ソース",
          kExcerpt: "原文の抜粋",
          kNonconformance: "不適合の理由",
          kFix: "修正の提案",
          kKeywords: "キーワード",
          kCheckpoint: "チェックポイント",
          kType: "タイプ",
          kSeverity: "重要度",
          kLocation: "場所",
          noIssues: "条件に一致する問題は見つかりませんでした。"
        }
      };

      let currentLang = "en";
      function t(key, ...args) { 
        let str = i18n[currentLang][key] || i18n["en"][key] || key;
        args.forEach((arg, i) => {
          str = str.replace("{" + i + "}", arg);
        });
        return str;
      }

      const state = {
        meta: {},
        items: [],
        filteredItems: [],
        page: 1,
        pageSize: 50,
        openIds: new Set()
      };

      function updateI18n() {
        document.getElementById("uiTitle").textContent = t("title");
        document.getElementById("uiH1").textContent = t("title");
        document.getElementById("uiLoad").textContent = t("load");
        document.getElementById("uiType").textContent = t("type");
        document.getElementById("uiSeverity").textContent = t("severity");
        document.getElementById("uiKeyword").textContent = t("keyword");
        document.getElementById("uiPath").textContent = t("path");
        document.getElementById("uiSearch").textContent = t("search");
        document.getElementById("q").placeholder = t("searchPlaceholder");
        document.getElementById("pathQ").placeholder = t("pathPlaceholder");
        document.getElementById("uiAll1").textContent = t("all");
        document.getElementById("uiAll2").textContent = t("all");
        document.getElementById("uiAll3").textContent = t("all");
        document.getElementById("prevBtn").textContent = t("prev");
        document.getElementById("nextBtn").textContent = t("next");
        document.getElementById("uiPageSize").textContent = t("pageSize");
        document.getElementById("uiReset").textContent = t("reset");
        document.getElementById("uiExpandAll").textContent = t("expandAll");
        document.getElementById("uiCollapseAll").textContent = t("collapseAll");
        
        if (state.items.length === 0 && !state.meta.total) {
          document.getElementById("emptyList").textContent = t("emptyList");
        } else if (state.items.length === 0) {
          document.getElementById("metaInfo").textContent = t("metaEmpty");
        } else {
          document.getElementById("metaInfo").textContent = t("metaLoaded", state.items.length, state.meta.industry_key || 'N/A');
        }

        renderList();
      }

      document.getElementById("globalLangSelect").addEventListener("change", (e) => {
        currentLang = e.target.value;
        updateI18n();
      });

      function getAllKeywords(items) {
        const out = new Set();
        items.forEach(it => (it.keywords || []).forEach(k => out.add(String(k))));
        return Array.from(out).filter(Boolean).sort((a, b) => a.localeCompare(b));
      }

      async function loadData() {
        try {
          const res = await fetch('./qc_report.json');
          if (!res.ok) throw new Error('Network response was not ok');
          const data = await res.json();
          state.meta = data.meta || {};
          state.items = data.items || [];
          state.openIds = new Set();
          
          if (state.meta.language && ["en", "zh-CN", "ja"].includes(state.meta.language)) {
            currentLang = state.meta.language;
            document.getElementById("globalLangSelect").value = currentLang;
          } else if (state.meta.language === "zh") {
            currentLang = "zh-CN";
            document.getElementById("globalLangSelect").value = currentLang;
          }
          
          const types = new Set();
          state.items.forEach(i => types.add(i.type));
          const typeSelect = document.getElementById("typeFilter");
          typeSelect.innerHTML = `<option value="" id="uiAll1">${t("all")}</option>`;
          Array.from(types).sort().forEach(type => {
            const opt = document.createElement("option");
            opt.value = type;
            opt.textContent = type;
            typeSelect.appendChild(opt);
          });

          const keywordSelect = document.getElementById("keywordFilter");
          keywordSelect.innerHTML = `<option value="" id="uiAll3">${t("all")}</option>`;
          getAllKeywords(state.items).forEach(k => {
            const opt = document.createElement("option");
            opt.value = k;
            opt.textContent = k;
            keywordSelect.appendChild(opt);
          });

          applyFilters();
          updateI18n();
        } catch (e) {
          alert("Failed to load qc_report.json. Make sure you run this in a server or allow local file access.");
          console.error(e);
        }
      }

      function applyFilters() {
        const type = document.getElementById("typeFilter").value;
        const severity = document.getElementById("severityFilter").value;
        const keyword = document.getElementById("keywordFilter").value;
        const pathQ = document.getElementById("pathQ").value.trim().toLowerCase();
        const q = document.getElementById("q").value.toLowerCase();
        
        state.filteredItems = state.items.filter(item => {
          if (type && item.type !== type) return false;
          if (severity && item.severity !== severity) return false;
          if (keyword) {
            const kws = item.keywords || [];
            if (!kws.map(String).includes(keyword)) return false;
          }
          if (pathQ) {
            const loc = String(item.location || "").toLowerCase();
            if (!loc.includes(pathQ)) return false;
          }
          if (q) {
            const text = [item.id, item.checkpoint, item.location, item.excerpt, item.nonconformance, item.fix_suggestion, ...(item.keywords || [])].join(" ").toLowerCase();
            if (!text.includes(q)) return false;
          }
          return true;
        });
        
        state.page = 1;
        renderList();
      }

      function normalizeSeverity(s) {
        const sev = String(s || "").toUpperCase();
        if (sev === "P0") return 0;
        if (sev === "P1") return 1;
        if (sev === "P2") return 2;
        return 9;
      }

      function compareItems(a, b) {
        const sa = normalizeSeverity(a.severity);
        const sb = normalizeSeverity(b.severity);
        if (sa !== sb) return sa - sb;
        return String(a.id || "").localeCompare(String(b.id || ""));
      }

      function renderList() {
        const wrap = document.getElementById("listWrap");
        wrap.innerHTML = "";
        
        if (state.filteredItems.length === 0) {
          wrap.innerHTML = `<div class="empty">${state.items.length > 0 ? t("noIssues") : (state.meta.total === 0 ? t("metaEmpty") : t("emptyList"))}</div>`;
          document.getElementById("countInfo").textContent = t("countInfo", 0, state.items.length || 0);
          document.getElementById("pageInfo").textContent = t("pageInfo", 1, 1);
          document.getElementById("prevBtn").disabled = true;
          document.getElementById("nextBtn").disabled = true;
          return;
        }

        const sorted = state.filteredItems.slice().sort(compareItems);
        const totalPages = Math.ceil(sorted.length / state.pageSize);
        document.getElementById("pageInfo").textContent = t("pageInfo", state.page, totalPages);
        document.getElementById("prevBtn").disabled = state.page <= 1;
        document.getElementById("nextBtn").disabled = state.page >= totalPages;
        document.getElementById("countInfo").textContent = t("countInfo", sorted.length, state.items.length || 0);

        const start = (state.page - 1) * state.pageSize;
        const end = Math.min(start + state.pageSize, sorted.length);
        const pageItems = sorted.slice(start, end);

        pageItems.forEach(item => {
          const d = document.createElement("details");
          d.className = "item";
          if (state.openIds.has(item.id)) d.open = true;

          const s = document.createElement("summary");
          s.className = "itemSum";

          const sumLeft = document.createElement("div");
          sumLeft.className = "sumLeft";

          const sev = document.createElement("span");
          sev.className = `pill ${item.severity}`;
          sev.textContent = item.severity || "-";

          const sumMain = document.createElement("div");
          sumMain.className = "sumMain";

          const title = document.createElement("div");
          title.className = "sumTitle";
          title.textContent = `${item.id || "-"} · ${item.type || "-"} · ${item.checkpoint || "-"}`;

          const meta = document.createElement("div");
          meta.className = "sumMeta";
          meta.textContent = String(item.location || "-");

          sumMain.appendChild(title);
          sumMain.appendChild(meta);

          sumLeft.appendChild(sev);
          sumLeft.appendChild(sumMain);

          const sumRight = document.createElement("div");
          sumRight.className = "sumRight";

          const tType = document.createElement("span");
          tType.className = "tag muted";
          tType.textContent = item.type || "-";

          sumRight.appendChild(tType);

          s.appendChild(sumLeft);
          s.appendChild(sumRight);

          const body = document.createElement("div");
          body.className = "itemBody";
          body.innerHTML = `
            <div class="kv">
              <div class="k">${t("kSeverity")}</div>
              <div class="v">${item.severity || "-"}</div>
              <div class="k">${t("kType")}</div>
              <div class="v">${item.type || "-"}</div>
              <div class="k">${t("kCheckpoint")}</div>
              <div class="v">${item.checkpoint || "-"}</div>
              <div class="k">${t("kLocation")}</div>
              <div class="v">${item.location || "-"}</div>
              <div class="k">${t("kStandard")}</div>
              <div class="v">${item.standard_source || "-"}</div>
              <div class="k">${t("kExcerpt")}</div>
              <div class="v">${item.excerpt || "-"}</div>
              <div class="k">${t("kNonconformance")}</div>
              <div class="v danger">${item.nonconformance || "-"}</div>
              <div class="k">${t("kFix")}</div>
              <div class="v">${item.fix_suggestion || "-"}</div>
              <div class="k">${t("kKeywords")}</div>
              <div class="v kwWrap">${(item.keywords || []).map(k => `<span class="pill">${String(k)}</span>`).join("")}</div>
            </div>
          `;

          d.appendChild(s);
          d.appendChild(body);

          d.addEventListener("toggle", () => {
            if (!item.id) return;
            if (d.open) state.openIds.add(item.id);
            else state.openIds.delete(item.id);
          });

          wrap.appendChild(d);
        });
      }

      document.getElementById("loadBtn").addEventListener("click", loadData);
      document.getElementById("typeFilter").addEventListener("change", applyFilters);
      document.getElementById("severityFilter").addEventListener("change", applyFilters);
      document.getElementById("keywordFilter").addEventListener("change", applyFilters);
      document.getElementById("pathQ").addEventListener("input", applyFilters);
      document.getElementById("q").addEventListener("input", applyFilters);
      document.getElementById("pageSize").addEventListener("change", (e) => {
        const n = Number(e.target.value);
        state.pageSize = Number.isFinite(n) && n > 0 ? n : 50;
        state.page = 1;
        renderList();
      });
      
      document.getElementById("prevBtn").addEventListener("click", () => {
        if (state.page > 1) {
          state.page--;
          renderList();
        }
      });
      document.getElementById("nextBtn").addEventListener("click", () => {
        const totalPages = Math.ceil(state.filteredItems.length / state.pageSize);
        if (state.page < totalPages) {
          state.page++;
          renderList();
        }
      });

      document.getElementById("resetBtn").addEventListener("click", () => {
        document.getElementById("typeFilter").value = "";
        document.getElementById("severityFilter").value = "";
        document.getElementById("keywordFilter").value = "";
        document.getElementById("pathQ").value = "";
        document.getElementById("q").value = "";
        state.openIds = new Set();
        applyFilters();
      });

      document.getElementById("expandBtn").addEventListener("click", () => {
        state.filteredItems.forEach(it => { if (it && it.id) state.openIds.add(it.id); });
        renderList();
      });

      document.getElementById("collapseBtn").addEventListener("click", () => {
        state.openIds = new Set();
        renderList();
      });

      // Try loading initially
      setTimeout(loadData, 500);
    </script>
  </body>
</html>
