<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title id="uiTitle">VSpec Details</title>
    <style>
      :root {
        --bg: #ffffff;
        --panel: #ffffff;
        --panel2: #ffffff;
        --text: #111827;
        --muted: rgba(17, 24, 39, 0.72);
        --border: rgba(17, 24, 39, 0.14);
        --primary: #2563eb;
        --accent: #16a34a;
        --warn: #d97706;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          "Apple Color Emoji",
          "Segoe UI Emoji";
      }
      .top-banner {
        position: sticky;
        top: 0;
        z-index: 20;
        background: rgba(217, 119, 6, 0.10);
        border-bottom: 1px solid rgba(217, 119, 6, 0.28);
      }
      .top-banner .inner {
        max-width: 1400px;
        margin: 0 auto;
        padding: 10px 16px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
      }
      .top-banner .msg {
        font-size: 13px;
        color: rgba(217, 119, 6, 0.98);
      }
      .top-banner .msg b {
        color: var(--text);
      }
      .wrap {
        max-width: 1400px;
        margin: 0 auto;
        padding: 12px 12px 28px;
      }
      .shell {
        display: grid;
        grid-template-columns: 340px 1fr;
        gap: 12px;
        min-height: calc(100vh - 90px);
      }
      @media (max-width: 980px) {
        .shell {
          grid-template-columns: 1fr;
        }
      }
      .panel {
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--panel);
        box-shadow: 0 10px 26px rgba(17, 24, 39, 0.06);
        overflow: hidden;
      }
      .sidebar-header {
        padding: 12px;
        border-bottom: 1px solid var(--border);
        background: rgba(17, 24, 39, 0.02);
      }
      .sidebar-title {
        font-size: 13px;
        color: var(--text);
        margin: 0 0 8px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .sidebar-meta {
        font-size: 12px;
        color: var(--muted);
      }
      .search {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-top: 10px;
      }
      input[type="text"] {
        width: 100%;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: #ffffff;
        color: var(--text);
        padding: 9px 10px;
        font-size: 13px;
        outline: none;
      }
      button {
        border: 1px solid var(--border);
        background: rgba(17, 24, 39, 0.04);
        color: var(--text);
        border-radius: 10px;
        padding: 8px 10px;
        cursor: pointer;
        font-size: 13px;
      }
      button.primary {
        background: rgba(37, 99, 235, 0.10);
        border-color: rgba(37, 99, 235, 0.30);
      }
      .tree {
        padding: 8px 8px 12px;
        overflow: auto;
        max-height: calc(100vh - 190px);
      }
      @media (max-width: 980px) {
        .tree {
          max-height: 46vh;
        }
      }
      .outline-wrap {
        padding: 8px 8px 12px;
        overflow: auto;
        max-height: calc(100vh - 190px);
      }
      @media (max-width: 980px) {
        .outline-wrap {
          max-height: 46vh;
        }
      }
      details {
        border-radius: 10px;
      }
      details > summary {
        list-style: none;
        cursor: pointer;
        user-select: none;
        padding: 7px 8px;
        border-radius: 10px;
        color: var(--text);
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      details > summary::-webkit-details-marker {
        display: none;
      }
      details > summary:hover {
        background: rgba(255, 255, 255, 0.04);
      }
      .node {
        margin-left: 10px;
        padding-left: 8px;
        border-left: 1px dashed rgba(17, 24, 39, 0.16);
      }
      .file {
        display: flex;
        width: 100%;
        padding: 7px 10px;
        border-radius: 10px;
        border: 1px solid transparent;
        background: transparent;
        text-align: left;
        cursor: pointer;
        color: var(--text);
        font-size: 13px;
      }
      .file:hover {
        background: rgba(17, 24, 39, 0.04);
      }
      .file.active {
        background: rgba(37, 99, 235, 0.10);
        border-color: rgba(37, 99, 235, 0.28);
      }
      .main-header {
        padding: 12px 12px 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .pathbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--panel2);
      }
      .pathbar .left {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }
      .badge {
        font-size: 12px;
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 4px 10px;
        background: rgba(17, 24, 39, 0.02);
      }
      .path {
        font-size: 13px;
        color: var(--text);
        word-break: break-all;
      }
      .content {
        padding: 12px;
      }
      .doc {
        border: 1px solid var(--border);
        border-radius: 14px;
        background: #ffffff;
        padding: 16px 16px 18px;
      }
      .doc h1,
      .doc h2,
      .doc h3,
      .doc h4,
      .doc h5,
      .doc h6 {
        margin: 18px 0 10px;
        color: var(--text);
      }
      .doc h1 {
        font-size: 22px;
      }
      .doc h2 {
        font-size: 18px;
      }
      .doc h3 {
        font-size: 16px;
      }
      .doc p {
        margin: 10px 0;
        color: rgba(17, 24, 39, 0.92);
        line-height: 1.55;
      }
      .doc a {
        color: rgba(37, 99, 235, 0.95);
      }
      .doc code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New",
          monospace;
        background: rgba(17, 24, 39, 0.04);
        padding: 2px 5px;
        border-radius: 6px;
        border: 1px solid rgba(17, 24, 39, 0.10);
      }
      .doc pre {
        background: #f8fafc;
        border: 1px solid rgba(17, 24, 39, 0.12);
        border-radius: 12px;
        padding: 12px;
        overflow: auto;
        line-height: 1.45;
      }
      .doc pre code {
        background: transparent;
        border: none;
        padding: 0;
      }
      .doc table {
        width: 100%;
        border-collapse: collapse;
        margin: 12px 0 14px;
      }
      .doc th,
      .doc td {
        border: 1px solid rgba(17, 24, 39, 0.14);
        padding: 8px 10px;
        vertical-align: top;
      }
      .doc th {
        background: rgba(17, 24, 39, 0.03);
        color: var(--text);
        text-align: left;
      }
      .doc ul,
      .doc ol {
        margin: 10px 0 10px 20px;
        line-height: 1.55;
      }
      .puml {
        width: 100%;
        text-align: center;
        margin: 14px 0;
      }
      .puml img {
        max-width: 100%;
        border-radius: 12px;
        border: 1px solid rgba(17, 24, 39, 0.12);
        background: rgba(17, 24, 39, 0.02);
      }
      iframe {
        width: 100%;
        height: calc(100vh - 240px);
        border: 1px solid rgba(17, 24, 39, 0.12);
        border-radius: 12px;
        background: #fff;
      }
      .empty {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }
      .tree-sep {
        height: 1px;
        background: var(--border);
        margin: 10px 6px;
      }
      .outline-title {
        padding: 8px 10px 2px;
        color: var(--muted);
        font-size: 12px;
      }
      .outline {
        padding: 6px 6px 0;
      }
      .outline a {
        display: block;
        padding: 6px 10px;
        border-radius: 10px;
        color: rgba(17, 24, 39, 0.92);
        text-decoration: none;
        border: 1px solid transparent;
        font-size: 13px;
      }
      .outline a:hover {
        background: rgba(17, 24, 39, 0.04);
      }
      .outline a.active {
        background: rgba(22, 163, 74, 0.10);
        border-color: rgba(22, 163, 74, 0.22);
      }
      .file.missing {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .md-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        justify-content: space-between;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: rgba(17, 24, 39, 0.02);
        margin-bottom: 12px;
      }
      .md-toolbar .left,
      .md-toolbar .right {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }
      .md-toolbar .hint {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
      }
      .md-split {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      @media (max-width: 980px) {
        .md-split {
          grid-template-columns: 1fr;
        }
      }
      .md-text {
        width: 100%;
        min-height: calc(100vh - 330px);
        border-radius: 14px;
        border: 1px solid var(--border);
        background: #ffffff;
        color: var(--text);
        padding: 12px;
        font-size: 13px;
        line-height: 1.45;
        outline: none;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New",
          monospace;
      }
      .mode-btn.active {
        background: rgba(37, 99, 235, 0.10);
        border-color: rgba(37, 99, 235, 0.30);
      }
      .langSelect {
        background: rgba(17, 24, 39, 0.04);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 8px;
        padding: 6px 8px;
        font-size: 12px;
        outline: none;
      }

      .outline-overlay {
        position: fixed;
        right: 16px;
        top: 92px;
        width: 360px;
        height: calc(100vh - 120px);
        z-index: 120;
        display: none;
      }
      .outline-overlay.open {
        display: block;
      }
      .outline-overlay .outline-wrap {
        max-height: calc(100vh - 220px);
      }
      @media (max-width: 980px) {
        .outline-overlay {
          left: 12px;
          right: 12px;
          width: auto;
          top: 92px;
          height: calc(100vh - 120px);
        }
        .outline-overlay .outline-wrap {
          max-height: calc(100vh - 240px);
        }
      }
    </style>
  </head>
  <body>
    <div style="position: absolute; top: 12px; right: 16px; z-index: 100;">
      <select id="globalLangSelect" class="langSelect">
        <option value="en">English</option>
        <option value="zh-CN">中文</option>
        <option value="ja">日本語</option>
      </select>
    </div>
    <div class="top-banner">
      <div class="inner">
        <div class="msg" id="uiWordExport"></div>
      </div>
    </div>

    <div class="wrap">
      <div class="shell">
        <div class="panel">
          <div class="sidebar-header">
            <div class="sidebar-title">
              <span id="uiDetailsIndex">Details Index</span>
              <span class="badge" id="fileCount">0 files</span>
            </div>
            <div class="sidebar-meta" id="uiClickToRender">Click a file to render it on the right.</div>
            <div class="search">
              <input id="search" type="text" placeholder="Search path..." />
              <button id="collapseAll">Collapse</button>
            </div>
          </div>
          <div class="tree">
            <div id="nav"></div>
          </div>
        </div>

        <div class="panel">
          <div class="main-header">
            <div class="pathbar">
              <div class="left">
                <span class="badge" id="typeBadge">—</span>
                <span class="path" id="currentPath">No file selected</span>
              </div>
              <div class="right">
                <button id="toggleOutline" class="primary"><span id="uiOutline">Outline</span></button>
                <button id="copyPath"><span id="uiCopyPath">Copy Path</span></button>
              </div>
            </div>
          </div>
          <div class="content">
            <div class="doc" id="viewer">
              <div class="empty" id="uiEmptyDoc"></div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <div id="outlineOverlay" class="panel outline-overlay">
      <div class="sidebar-header">
        <div class="sidebar-title">
          <span id="uiOutline2">Outline</span>
          <button id="closeOutline">Close</button>
        </div>
      </div>
      <div class="outline-wrap">
        <div id="outline" class="outline"></div>
      </div>
    </div>

      let currentLang = "en";
      function t(key) { return i18n[currentLang][key] || i18n["en"][key] || key; }

      window.__VSPEC_DETAILS_FILES__ = window.__VSPEC_DETAILS_FILES__ || {};

      const PLANTUML_SERVER = "https://www.plantuml.com/plantuml/svg/";

      const dom = {
        nav: document.getElementById("nav"),
        outline: document.getElementById("outline"),
        outlineOverlay: document.getElementById("outlineOverlay"),
        toggleOutline: document.getElementById("toggleOutline"),
        closeOutline: document.getElementById("closeOutline"),
        search: document.getElementById("search"),
        fileCount: document.getElementById("fileCount"),
        viewer: document.getElementById("viewer"),
        currentPath: document.getElementById("currentPath"),
        typeBadge: document.getElementById("typeBadge"),
        copyPath: document.getElementById("copyPath"),
        collapseAll: document.getElementById("collapseAll"),
      };

      const state = {
        files: {},
        paths: [],
        tree: null,
        meta: {},
        activePath: null,
        activeButton: null,
        handles: new Map(),
        activeHeadings: [],
        activeHeadingId: null,
      };

      function escapeHtml(str) {
        return String(str)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function fileType(path) {
        const i = path.lastIndexOf(".");
        const ext = i >= 0 ? path.slice(i + 1).toLowerCase() : "";
        if (ext === "md") return "Markdown";
        if (ext === "html") return "HTML";
        if (ext === "puml") return "PlantUML";
        return ext ? ext.toUpperCase() : t("fileType");
      }

      function setActive(path, button) {
        if (state.activeButton) state.activeButton.classList.remove("active");
        state.activeButton = button || null;
        if (state.activeButton) state.activeButton.classList.add("active");
        state.activePath = path;
        dom.currentPath.textContent = path || t("noFile");
        dom.typeBadge.textContent = path ? fileType(path) : "—";
        if (path) location.hash = encodeURIComponent(path);
      }
      
      function findNavButtonByPath(path) {
        const btns = dom.nav.querySelectorAll("button.file");
        for (const b of btns) {
          if (b && b.dataset && b.dataset.path === path) return b;
        }
        return null;
      }

      function exists(path) {
        return state.files[path] != null;
      }

      function pickFirst(candidates) {
        for (const p of candidates) {
          if (exists(p)) return p;
        }
        return null;
      }

      function listByPrefix(prefix) {
        return state.paths.filter((p) => p.startsWith(prefix));
      }

      function basename(path) {
        const s = (path || "").split("/").filter(Boolean);
        return s.length ? s[s.length - 1] : path;
      }

      function firstHeadingTitle(md) {
        const m = String(md || "").match(/^#{1,6}\s+(.+)\s*$/m);
        return m ? m[1].trim() : "";
      }

      function displayTitle(path) {
        const ft = fileType(path);
        if (ft === "Markdown") {
          const title = firstHeadingTitle(state.files[path] || "");
          return title || basename(path);
        }
        return basename(path);
      }

      function slugify(text) {
        return String(text || "")
          .trim()
          .toLowerCase()
          .replace(/[`"'<>]/g, "")
          .replace(/\s+/g, "-")
          .replace(/[^a-z0-9\u4e00-\u9fff\u3040-\u30ff_-]/g, "");
      }

      function extractHeadings(md) {
        const lines = String(md || "").replace(/\r\n/g, "\n").split("\n");
        const out = [];
        let idx = 0;
        for (const line of lines) {
          const m = line.match(/^(#{1,6})\s+(.+)\s*$/);
          if (!m) continue;
          idx++;
          const level = m[1].length;
          const text = m[2].trim();
          const id = `h-${slugify(text) || "section"}-${idx}`;
          out.push({ level, text, id });
        }
        return out;
      }

      function filterMatch(filterLower, label, path) {
        if (!filterLower) return true;
        return `${label || ""} ${path || ""}`.toLowerCase().includes(filterLower);
      }

      function getModuleSlug(path) {
        const parts = String(path || "").split("/").filter(Boolean);
        if (parts.length >= 3 && parts[0] === "specs" && parts[1] === "details") return parts[2];
        return null;
      }

      function groupBy(arr, getKey) {
        const m = new Map();
        for (const x of arr) {
          const k = getKey(x);
          if (!m.has(k)) m.set(k, []);
          m.get(k).push(x);
        }
        return m;
      }

      function buildDirectoryTree(paths) {
        const root = { type: "group", label: "/", dirs: new Map(), files: [] };
        const ensureDir = (node, label) => {
          const k = String(label || "");
          if (!node.dirs.has(k)) node.dirs.set(k, { type: "group", label: k, dirs: new Map(), files: [] });
          return node.dirs.get(k);
        };
        for (const p of paths || []) {
          const parts = String(p || "").split("/").filter(Boolean);
          if (!parts.length) continue;
          let cur = root;
          for (let i = 0; i < parts.length - 1; i++) {
            cur = ensureDir(cur, parts[i]);
          }
          const name = parts[parts.length - 1];
          cur.files.push({ type: "file", label: name, path: p });
        }
        const finalize = (node) => {
          const dirChildren = Array.from(node.dirs.values())
            .sort((a, b) => a.label.localeCompare(b.label))
            .map(finalize);
          const fileChildren = (node.files || []).slice().sort((a, b) => a.label.localeCompare(b.label));
          return { type: "group", label: node.label, children: [...dirChildren, ...fileChildren] };
        };
        return finalize(root);
      }
      
      function systemLabel() {
        const m = state.meta && typeof state.meta === "object" ? state.meta : {};
        return (m.system_name || m.system || m.title || "").toString().trim() || t("system");
      }
      
      function buildSystemTree(paths) {
        const root = { type: "group", label: systemLabel(), children: [] };
        
        const scenarioHomePath = "/specs/details/__scenarios__";
        const scenarioNodes = [];
        scenarioNodes.push({ type: "file", label: t("scenarioHome"), path: scenarioHomePath });
        if (exists("/specs/background/scenarios.md")) scenarioNodes.push({ type: "file", label: "scenarios.md", path: "/specs/background/scenarios.md" });
        const scenarioDetailPaths = (paths || []).filter((p) => String(p || "").startsWith("/specs/background/scenario_details/"));
        if (scenarioDetailPaths.length) {
          scenarioDetailPaths.sort((a, b) => a.localeCompare(b));
          const sdChildren = [];
          for (const p of scenarioDetailPaths) sdChildren.push({ type: "file", label: p.replace("/specs/background/scenario_details/", ""), path: p });
          scenarioNodes.push({ type: "group", label: t("scenarioDetails"), children: sdChildren });
        }
        root.children.push({ type: "group", label: t("scenarios"), children: scenarioNodes });
        
        const detailPaths = (paths || []).filter((p) => String(p || "").startsWith("/specs/details/"));
        const modules = new Map();
        for (const p of detailPaths) {
          const parts = String(p || "").split("/").filter(Boolean);
          if (parts.length < 4) continue;
          if (parts[0] !== "specs" || parts[1] !== "details") continue;
          const moduleSlug = parts[2];
          const detailType = parts[3];
          const fileName = parts.slice(4).join("/");
          if (!fileName) continue;
          const funcSlug = fileName.replace(/\.[^/.]+$/, "");
          if (!modules.has(moduleSlug)) modules.set(moduleSlug, new Map());
          const funcs = modules.get(moduleSlug);
          if (!funcs.has(funcSlug)) funcs.set(funcSlug, []);
          funcs.get(funcSlug).push({ path: p, detailType, fileName: basename(p) });
        }
        
        const moduleChildren = [];
        for (const [moduleSlug, funcs] of Array.from(modules.entries()).sort((a, b) => a[0].localeCompare(b[0]))) {
          const functionChildren = [];
          for (const [funcSlug, files] of Array.from(funcs.entries()).sort((a, b) => a[0].localeCompare(b[0]))) {
            files.sort((a, b) => `${a.detailType}/${a.fileName}`.localeCompare(`${b.detailType}/${b.fileName}`));
            const detailFiles = files.map((f) => ({ type: "file", label: `${f.detailType}/${f.fileName}`, path: f.path }));
            functionChildren.push({
              type: "group",
              label: funcSlug,
              children: [
                { type: "group", label: t("details"), children: detailFiles },
              ],
            });
          }
          moduleChildren.push({ type: "group", label: moduleSlug, children: functionChildren });
        }
        root.children.push({ type: "group", label: t("modules"), children: moduleChildren });
        
        const otherPaths = (paths || []).filter((p) => {
          const s = String(p || "");
          if (s.startsWith("/specs/details/")) return false;
          if (s.startsWith("/specs/background/scenario_details/")) return false;
          if (s === "/specs/background/scenarios.md") return false;
          if (!s.endsWith(".puml")) return false;
          return true;
        });
        otherPaths.sort((a, b) => a.localeCompare(b));
        const otherChildren = [];
        for (const p of otherPaths) {
          if (!exists(p)) continue;
          otherChildren.push({ type: "file", label: p.replace(/^\/specs\//, ""), path: p });
        }
        if (otherChildren.length) root.children.push({ type: "group", label: t("other"), children: otherChildren });
        
        return root;
      }

      function anyChildMatches(node, filterLower) {
        if (!node) return false;
        if (node.type === "file") return filterMatch(filterLower, node.label, node.path);
        if (node.children && node.children.length) return node.children.some((c) => anyChildMatches(c, filterLower));
        return false;
      }

      function renderNavNode(node, container, filterLower) {
        if (node.type === "file") {
          if (!filterMatch(filterLower, node.label, node.path)) return;
          const btn = document.createElement("button");
          btn.className = "file";
          btn.dataset.path = node.path;
          const title = exists(node.path) ? displayTitle(node.path) : node.label;
          btn.textContent = title;
          if (!exists(node.path) || node.missing) {
            btn.classList.add("missing");
            btn.disabled = true;
          } else {
            btn.addEventListener("click", () => openFile(node.path, btn));
          }
          if (state.activePath === node.path) btn.classList.add("active");
          container.appendChild(btn);
          return;
        }

        if (!anyChildMatches(node, filterLower)) return;
        const det = document.createElement("details");
        det.open = !filterLower;
        const sum = document.createElement("summary");
        sum.textContent = node.label;
        det.appendChild(sum);
        const inner = document.createElement("div");
        inner.className = "node";
        det.appendChild(inner);
        container.appendChild(det);
        for (const c of node.children || []) renderNavNode(c, inner, filterLower);
      }

      function renderSidebar() {
        dom.nav.innerHTML = "";
        const filterLower = (dom.search.value || "").trim().toLowerCase();
        const tree = buildSystemTree(state.paths);
        renderNavNode(tree, dom.nav, filterLower);
      }

      function renderOutline(headings) {
        dom.outline.innerHTML = "";
        const hs = (headings || []).filter((h) => h.level >= 1 && h.level <= 4);
        if (!state.activePath || fileType(state.activePath) !== "Markdown" || !hs.length) {
          const a = document.createElement("a");
          a.href = "javascript:void(0)";
          a.textContent = "—";
          a.style.cursor = "default";
          dom.outline.appendChild(a);
          return;
        }
        for (const h of hs) {
          const a = document.createElement("a");
          a.href = "javascript:void(0)";
          a.textContent = h.text;
          a.style.paddingLeft = `${10 + (h.level - 1) * 12}px`;
          if (state.activeHeadingId === h.id) a.classList.add("active");
          a.addEventListener("click", () => {
            const el = document.getElementById(h.id);
            if (el) {
              state.activeHeadingId = h.id;
              el.scrollIntoView({ block: "start", behavior: "smooth" });
              renderOutline(state.activeHeadings);
            }
          });
          dom.outline.appendChild(a);
        }
      }

      function encode6bit(b) {
        if (b < 10) return String.fromCharCode(48 + b);
        b -= 10;
        if (b < 26) return String.fromCharCode(65 + b);
        b -= 26;
        if (b < 26) return String.fromCharCode(97 + b);
        b -= 26;
        if (b === 0) return "-";
        if (b === 1) return "_";
        return ".";
      }

      function append3bytes(b1, b2, b3) {
        const c1 = b1 >> 2;
        const c2 = ((b1 & 0x3) << 4) | (b2 >> 4);
        const c3 = ((b2 & 0xf) << 2) | (b3 >> 6);
        const c4 = b3 & 0x3f;
        return "" + encode6bit(c1 & 0x3f) + encode6bit(c2 & 0x3f) + encode6bit(c3 & 0x3f) + encode6bit(c4 & 0x3f);
      }

      function encode64(bytes) {
        let r = "";
        for (let i = 0; i < bytes.length; i += 3) {
          if (i + 2 === bytes.length) {
            r += append3bytes(bytes[i], bytes[i + 1], 0);
          } else if (i + 1 === bytes.length) {
            r += append3bytes(bytes[i], 0, 0);
          } else {
            r += append3bytes(bytes[i], bytes[i + 1], bytes[i + 2]);
          }
        }
        return r;
      }

      async function deflateToBytes(text) {
        if (!("CompressionStream" in window)) {
          throw new Error("CompressionStream not supported");
        }
        const enc = new TextEncoder();
        const input = enc.encode(text);
        const cs = new CompressionStream("deflate");
        const writer = cs.writable.getWriter();
        await writer.write(input);
        await writer.close();
        const resp = new Response(cs.readable);
        const buf = await resp.arrayBuffer();
        const bytes = new Uint8Array(buf);
        if (bytes.length >= 6) {
          const cmf = bytes[0];
          const flg = bytes[1];
          const isZlib = ((cmf & 0x0f) === 8) && (((cmf << 8) + flg) % 31 === 0);
          if (isZlib && bytes.length > 6) {
            return bytes.slice(2, bytes.length - 4);
          }
        }
        return bytes;
      }

      async function plantUmlSvgUrl(source) {
        const bytes = await deflateToBytes(source);
        return PLANTUML_SERVER + encode64(bytes);
      }

      function parseMarkdown(md) {
        const lines = md.replace(/\r\n/g, "\n").split("\n");
        const blocks = [];
        let i = 0;
        while (i < lines.length) {
          const line = lines[i];
          const fence = line.match(/^```(\w+)?\s*$/);
          if (fence) {
            const lang = (fence[1] || "").toLowerCase();
            i++;
            const code = [];
            while (i < lines.length && !/^```/.test(lines[i])) {
              code.push(lines[i]);
              i++;
            }
            if (i < lines.length) i++;
            blocks.push({ type: "code", lang, text: code.join("\n") });
            continue;
          }

          const h = line.match(/^(#{1,6})\s+(.*)\s*$/);
          if (h) {
            blocks.push({ type: "heading", level: h[1].length, text: h[2] });
            i++;
            continue;
          }

          if (/^\s*\|/.test(line) && i + 1 < lines.length && /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(lines[i + 1])) {
            const header = line.trim();
            const sep = lines[i + 1];
            i += 2;
            const rows = [];
            while (i < lines.length && /^\s*\|/.test(lines[i])) {
              rows.push(lines[i].trim());
              i++;
            }
            blocks.push({ type: "table", header, sep, rows });
            continue;
          }

          const ul = line.match(/^\s*-\s+(.*)\s*$/);
          if (ul) {
            const items = [];
            while (i < lines.length) {
              const m = lines[i].match(/^\s*-\s+(.*)\s*$/);
              if (!m) break;
              items.push(m[1]);
              i++;
            }
            blocks.push({ type: "ul", items });
            continue;
          }

          const ol = line.match(/^\s*\d+\.\s+(.*)\s*$/);
          if (ol) {
            const items = [];
            while (i < lines.length) {
              const m = lines[i].match(/^\s*\d+\.\s+(.*)\s*$/);
              if (!m) break;
              items.push(m[1]);
              i++;
            }
            blocks.push({ type: "ol", items });
            continue;
          }

          if (!line.trim()) {
            i++;
            continue;
          }

          const para = [];
          while (i < lines.length && lines[i].trim() && !/^```/.test(lines[i]) && !/^(#{1,6})\s+/.test(lines[i]) && !/^\s*-\s+/.test(lines[i]) && !/^\s*\d+\.\s+/.test(lines[i])) {
            para.push(lines[i]);
            i++;
          }
          blocks.push({ type: "p", text: para.join("\n") });
        }
        return blocks;
      }

      function renderInline(text) {
        let t = escapeHtml(text);
        t = t.replace(/`([^`]+)`/g, (m, g1) => `<code>${escapeHtml(g1)}</code>`);
        t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (m, g1, g2) => `<a href="${escapeHtml(g2)}" target="_blank" rel="noreferrer">${escapeHtml(g1)}</a>`);
        return t.replace(/\n/g, "<br />");
      }

      function splitTableRow(line) {
        let s = line.trim();
        if (s.startsWith("|")) s = s.slice(1);
        if (s.endsWith("|")) s = s.slice(0, -1);
        return s.split("|").map((c) => c.trim());
      }

      async function renderMarkdown(md) {
        const root = document.createElement("div");
        const blocks = parseMarkdown(md);
        let hIndex = 0;
        const headings = [];
        for (const b of blocks) {
          if (b.type === "heading") {
            hIndex++;
            const id = `h-${slugify(b.text) || "section"}-${hIndex}`;
            headings.push({ level: b.level, text: b.text, id });
            const h = document.createElement("h" + b.level);
            h.id = id;
            h.innerHTML = renderInline(b.text);
            root.appendChild(h);
            continue;
          }
          if (b.type === "p") {
            const p = document.createElement("p");
            p.innerHTML = renderInline(b.text);
            root.appendChild(p);
            continue;
          }
          if (b.type === "ul") {
            const ul = document.createElement("ul");
            for (const it of b.items) {
              const li = document.createElement("li");
              li.innerHTML = renderInline(it);
              ul.appendChild(li);
            }
            root.appendChild(ul);
            continue;
          }
          if (b.type === "ol") {
            const ol = document.createElement("ol");
            for (const it of b.items) {
              const li = document.createElement("li");
              li.innerHTML = renderInline(it);
              ol.appendChild(li);
            }
            root.appendChild(ol);
            continue;
          }
          if (b.type === "table") {
            const table = document.createElement("table");
            const thead = document.createElement("thead");
            const trh = document.createElement("tr");
            for (const c of splitTableRow(b.header)) {
              const th = document.createElement("th");
              th.innerHTML = renderInline(c);
              trh.appendChild(th);
            }
            thead.appendChild(trh);
            table.appendChild(thead);
            const tbody = document.createElement("tbody");
            for (const row of b.rows) {
              const tr = document.createElement("tr");
              for (const c of splitTableRow(row)) {
                const td = document.createElement("td");
                td.innerHTML = renderInline(c);
                tr.appendChild(td);
              }
              tbody.appendChild(tr);
            }
            table.appendChild(tbody);
            root.appendChild(table);
            continue;
          }
          if (b.type === "code") {
            const lang = (b.lang || "").toLowerCase();
            if (lang === "plantuml" || lang === "puml") {
              const wrap = document.createElement("div");
              wrap.className = "puml";
              const img = document.createElement("img");
              img.alt = "PlantUML";
              wrap.appendChild(img);
              root.appendChild(wrap);
              try {
                img.src = await plantUmlSvgUrl(b.text);
              } catch (e) {
                const pre = document.createElement("pre");
                const code = document.createElement("code");
                code.textContent = b.text;
                pre.appendChild(code);
                wrap.innerHTML = "";
                wrap.appendChild(pre);
              }
              continue;
            }
            const pre = document.createElement("pre");
            const code = document.createElement("code");
            code.textContent = b.text;
            pre.appendChild(code);
            root.appendChild(pre);
            continue;
          }
        }
        state.activeHeadings = headings;
        state.activeHeadingId = null;
        return root;
      }

      async function linkLocalFileForWriteBack(path) {
        if (!("showOpenFilePicker" in window)) {
          alert("Browser does not support File System Access API. Use Download instead.");
          return;
        }
        const [handle] = await window.showOpenFilePicker({
          multiple: false,
          types: [{ description: "Files", accept: { "text/plain": [".md", ".puml", ".txt", ".html"] } }],
        });
        state.handles.set(path, handle);
      }

      async function saveToLinkedHandle(path, text) {
        const handle = state.handles.get(path);
        if (!handle) return false;
        const writable = await handle.createWritable();
        await writable.write(text);
        await writable.close();
        return true;
      }

      function downloadText(filename, text, type) {
        const blob = new Blob([text], { type: type || "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      async function openFile(path, btn) {
        if (!exists(path)) return;
        const content = state.files[path];
        const resolvedBtn = btn || findNavButtonByPath(path);
        btn = resolvedBtn || btn;
        setActive(path, btn);
        dom.viewer.innerHTML = "";
        if (path === "/specs/details/__scenarios__") {
          const wrap = document.createElement("div");
          wrap.className = "doc";
          const h = document.createElement("h1");
          h.textContent = t("scenarioHome");
          wrap.appendChild(h);
          
          const p1 = document.createElement("p");
          p1.textContent = t("scenarioIntro");
          wrap.appendChild(p1);
          
          const list = document.createElement("div");
          list.style.display = "grid";
          list.style.gap = "10px";
          
          const openBtn = document.createElement("button");
          openBtn.className = "primary";
          openBtn.textContent = t("openScenarios");
          openBtn.disabled = !exists("/specs/background/scenarios.md");
          openBtn.addEventListener("click", () => openFile("/specs/background/scenarios.md", null));
          list.appendChild(openBtn);
          
          const sdPaths = state.paths.filter((p) => String(p || "").startsWith("/specs/background/scenario_details/"));
          if (sdPaths.length) {
            const sec = document.createElement("div");
            sec.innerHTML = `<h2>${escapeHtml(t("scenarioDetails"))}</h2>`;
            const ul = document.createElement("div");
            ul.style.display = "grid";
            ul.style.gap = "8px";
            sdPaths.sort((a, b) => a.localeCompare(b));
            for (const sp of sdPaths) {
              const b = document.createElement("button");
              b.textContent = sp.replace("/specs/background/scenario_details/", "");
              b.addEventListener("click", () => openFile(sp, null));
              ul.appendChild(b);
            }
            sec.appendChild(ul);
            list.appendChild(sec);
          }
          
          wrap.appendChild(list);
          dom.viewer.appendChild(wrap);
          renderOutline([]);
          return;
        }
        const ft = fileType(path);
        if (ft === "HTML") {
          const iframe = document.createElement("iframe");
          iframe.srcdoc = content || "";
          dom.viewer.appendChild(iframe);
          return;
        }
        if (ft === "PlantUML") {
          const wrap = document.createElement("div");
          wrap.className = "puml";
          const img = document.createElement("img");
          img.alt = "PlantUML";
          wrap.appendChild(img);
          dom.viewer.appendChild(wrap);
          try {
            img.src = await plantUmlSvgUrl(content || "");
          } catch (e) {
            const pre = document.createElement("pre");
            const code = document.createElement("code");
            code.textContent = content || "";
            pre.appendChild(code);
            dom.viewer.appendChild(pre);
          }
          return;
        }
        if (ft === "Markdown") {
          const toolbar = document.createElement("div");
          toolbar.className = "md-toolbar";
          const left = document.createElement("div");
          left.className = "left";
          const right = document.createElement("div");
          right.className = "right";

          const modeSplit = document.createElement("button");
          modeSplit.className = "mode-btn active";
          modeSplit.textContent = t("split");
          const modeEdit = document.createElement("button");
          modeEdit.className = "mode-btn";
          modeEdit.textContent = t("edit");
          const modePreview = document.createElement("button");
          modePreview.className = "mode-btn";
          modePreview.textContent = t("preview");

          const linkBtn = document.createElement("button");
          linkBtn.textContent = t("linkFile");
          linkBtn.addEventListener("click", async () => {
            try {
              await linkLocalFileForWriteBack(path);
              alert("Linked. You can Save back now.");
            } catch (e) {}
          });

          const saveBtn = document.createElement("button");
          saveBtn.className = "primary";
          saveBtn.textContent = t("save");

          const dlBtn = document.createElement("button");
          dlBtn.textContent = t("download");

          const hint = document.createElement("div");
          hint.className = "hint";
          hint.textContent = t("mdHint");

          left.appendChild(modeSplit);
          left.appendChild(modeEdit);
          left.appendChild(modePreview);
          left.appendChild(hint);
          right.appendChild(linkBtn);
          right.appendChild(saveBtn);
          right.appendChild(dlBtn);
          toolbar.appendChild(left);
          toolbar.appendChild(right);

          const split = document.createElement("div");
          split.className = "md-split";
          const ta = document.createElement("textarea");
          ta.className = "md-text";
          ta.value = content || "";
          const previewWrap = document.createElement("div");
          previewWrap.className = "doc";
          split.appendChild(ta);
          split.appendChild(previewWrap);

          let timer = null;
          async function refresh() {
            previewWrap.innerHTML = "";
            const rendered = await renderMarkdown(ta.value || "");
            previewWrap.appendChild(rendered);
            renderOutline(state.activeHeadings);
          }
          await refresh();
          ta.addEventListener("input", () => {
            if (timer) clearTimeout(timer);
            timer = setTimeout(() => refresh(), 180);
          });

          function setMode(mode) {
            modeSplit.classList.remove("active");
            modeEdit.classList.remove("active");
            modePreview.classList.remove("active");
            if (mode === "split") modeSplit.classList.add("active");
            if (mode === "edit") modeEdit.classList.add("active");
            if (mode === "preview") modePreview.classList.add("active");
            if (mode === "split") {
              ta.style.display = "";
              previewWrap.style.display = "";
            } else if (mode === "edit") {
              ta.style.display = "";
              previewWrap.style.display = "none";
            } else {
              ta.style.display = "none";
              previewWrap.style.display = "";
            }
          }
          modeSplit.addEventListener("click", () => setMode("split"));
          modeEdit.addEventListener("click", () => setMode("edit"));
          modePreview.addEventListener("click", () => setMode("preview"));

          saveBtn.addEventListener("click", async () => {
            try {
              const ok = await saveToLinkedHandle(path, ta.value || "");
              if (!ok) alert("No linked file. Click Link File first, or use Download.");
              else alert("Saved.");
            } catch (e) {
              alert("Save failed.");
            }
          });
          dlBtn.addEventListener("click", () => {
            downloadText(basename(path), ta.value || "", "text/markdown;charset=utf-8");
          });

          dom.viewer.className = "";
          dom.viewer.appendChild(toolbar);
          dom.viewer.appendChild(split);
          return;
        }
        dom.viewer.className = "doc";
        const rendered = await renderMarkdown(content || "");
        dom.viewer.appendChild(rendered);
        renderOutline(state.activeHeadings);
      }

      function setFiles(files) {
        state.files = files || {};
        if (state.files["/specs/details/__scenarios__"] == null) state.files["/specs/details/__scenarios__"] = "";
        state.paths = Object.keys(state.files)
          .filter(
            (p) =>
              p &&
              p !== "/specs/details/reader.html" &&
              p !== "reader.html" &&
              !p.endsWith("/specs/details/reader.html") &&
              p !== "/specs/details/index.html" &&
              p !== "index.html" &&
              !p.endsWith("/specs/details/index.html") &&
              p !== "/specs/details/index.json" &&
              p !== "index.json" &&
              !p.endsWith("/specs/details/index.json"),
          )
          .sort((a, b) => a.localeCompare(b));
        dom.fileCount.textContent = `${state.paths.length} ${t("files")}`;
        renderSidebar();
        renderOutline([]);
        const fromHash = decodeURIComponent((location.hash || "").replace(/^#/, "")) || "";
        if (fromHash && state.files[fromHash] != null) {
          openFile(fromHash, null);
          return;
        }
        if (exists("/specs/details/__scenarios__")) {
          openFile("/specs/details/__scenarios__", null);
          return;
        }
        const firstFilePath = (node) => {
          if (!node) return null;
          if (node.type === "file") return node.path;
          const cs = Array.isArray(node.children) ? node.children : [];
          for (const c of cs) {
            const p = firstFilePath(c);
            if (p && exists(p)) return p;
          }
          return null;
        };
        const tree = buildSystemTree(state.paths);
        const first = firstFilePath(tree) || (state.paths.length ? state.paths[0] : null);
        if (first && state.files[first] != null) openFile(first, null);
      }
      
      function setIndexPayload(payload) {
        const p = payload && typeof payload === "object" ? payload : {};
        state.meta = p.meta && typeof p.meta === "object" ? p.meta : {};
        const files = p.files && typeof p.files === "object" ? p.files : {};
        state.tree = null;
        setFiles(files);
      }
      
      async function loadIndexJson() {
        const res = await fetch("./index.json", { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        setIndexPayload(data);
      }

      dom.search.addEventListener("input", () => renderSidebar());
      dom.copyPath.addEventListener("click", async () => {
        if (!state.activePath) return;
        try {
          await navigator.clipboard.writeText(state.activePath);
        } catch (e) {}
      });
      dom.collapseAll.addEventListener("click", () => {
        const ds = dom.nav.querySelectorAll("details");
        for (const d of ds) d.open = false;
      });

      function setOutlineOpen(open) {
        if (!dom.outlineOverlay) return;
        dom.outlineOverlay.classList.toggle("open", !!open);
      }
      if (dom.toggleOutline) {
        dom.toggleOutline.addEventListener("click", () => {
          const isOpen = dom.outlineOverlay && dom.outlineOverlay.classList.contains("open");
          setOutlineOpen(!isOpen);
        });
      }
      if (dom.closeOutline) dom.closeOutline.addEventListener("click", () => setOutlineOpen(false));

      
      function updateStaticUi() {
        document.getElementById("uiTitle").textContent = t("title");
        document.getElementById("uiWordExport").innerHTML = t("wordExport");
        document.getElementById("uiDetailsIndex").textContent = t("detailsIndex");
        document.getElementById("uiClickToRender").textContent = t("clickToRender");
        dom.search.placeholder = t("searchPath");
        document.getElementById("collapseAll").textContent = t("collapse");
        document.getElementById("uiOutline").textContent = t("outline");
        const outline2 = document.getElementById("uiOutline2");
        if (outline2) outline2.textContent = t("outline");
        if (dom.closeOutline) dom.closeOutline.textContent = t("close");
        document.getElementById("uiCopyPath").textContent = t("copyPath");
        if (!state.activePath) {
          dom.currentPath.textContent = t("noFile");
        }
        dom.fileCount.textContent = `${state.paths.length} ${t("files")}`;
        
        const emptyDoc = document.getElementById("uiEmptyDoc");
        if (emptyDoc) emptyDoc.innerHTML = t("emptyDoc");
      }
      
      document.getElementById("globalLangSelect").addEventListener("change", (e) => {
        currentLang = e.target.value;
        document.documentElement.lang = currentLang === "zh-CN" ? "zh-CN" : currentLang;
        updateStaticUi();
        renderSidebar();
        if (state.activePath) openFile(state.activePath, state.activeButton);
      });
      
      // Auto-detect lang
      const navLang = navigator.language || "";
      if (navLang.startsWith("zh")) currentLang = "zh-CN";
      else if (navLang.startsWith("ja")) currentLang = "ja";
      else currentLang = "en";
      document.getElementById("globalLangSelect").value = currentLang;
      document.documentElement.lang = currentLang === "zh-CN" ? "zh-CN" : currentLang;

      updateStaticUi();
      loadIndexJson()
        .catch(() => {
          state.tree = null;
          setFiles(window.__VSPEC_DETAILS_FILES__);
        });
    </script>
  </body>
</html>
