<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title id="uiTitle">Testcase Reader</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif; margin: 0; color: #111827; background: #f9fafb; }
      header { padding: 14px 18px; background: #111827; color: #fff; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
      header h1 { font-size: 14px; margin: 0; font-weight: 600; }
      header .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      button { font-size: 12px; padding: 7px 10px; border-radius: 10px; border: 1px solid #374151; background: #111827; color: #fff; cursor: pointer; }
      button.secondary { background: #fff; color: #111827; border-color: #d1d5db; }
      button:disabled { opacity: 0.6; cursor: not-allowed; }

      main { display: grid; grid-template-columns: 1fr; gap: 12px; padding: 12px; }
      .panel { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; overflow: hidden; min-height: 520px; }
      .panel .hd { padding: 12px 14px; border-bottom: 1px solid #e5e7eb; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
      .panel .bd { padding: 12px 14px; }

      .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
      label { font-size: 12px; color: #374151; }
      select, input[type="text"] { font-size: 12px; padding: 6px 8px; border: 1px solid #d1d5db; border-radius: 8px; background: #fff; color: #111827; }
      .pill { font-size: 12px; padding: 4px 8px; border-radius: 999px; background: #f3f4f6; border: 1px solid #e5e7eb; color: #111827; }
      table { width: 100%; border-collapse: collapse; font-size: 12px; }
      th, td { padding: 8px 10px; border-bottom: 1px solid #e5e7eb; vertical-align: top; }
      th { text-align: left; font-weight: 600; color: #374151; background: #f9fafb; position: sticky; top: 0; z-index: 1; }
      tbody tr { cursor: pointer; }
      tbody tr:hover { background: #f3f4f6; }
      .k { font-size: 12px; color: #374151; font-weight: 600; margin: 12px 0 6px; }
      .v { font-size: 12px; color: #111827; white-space: pre-wrap; word-break: break-word; }
      .empty { padding: 18px; color: #6b7280; font-size: 12px; }

      .split { display: grid; grid-template-rows: auto 1fr; height: 100%; }
      .rightBody { padding: 0; }
      .tableWrap { max-height: 360px; overflow: auto; border-top: 1px solid #e5e7eb; }
      .detailWrap { padding: 12px 14px; border-top: 1px solid #e5e7eb; }

      .tabs { display: inline-flex; border: 1px solid #374151; border-radius: 10px; overflow: hidden; }
      .tabBtn { font-size: 12px; padding: 7px 10px; border: none; background: #111827; color: rgba(255,255,255,0.85); cursor: pointer; }
      .tabBtnActive { background: #0b74d1; color: #fff; }
      .tabBtn:disabled { opacity: 0.45; cursor: not-allowed; }

      @media (max-width: 1080px) {
        main { grid-template-columns: 1fr; }
        .panel { min-height: auto; }
      }
    </style>
  </head>
  <body>
    <div style="position: absolute; top: 12px; right: 16px; z-index: 100;">
      <select id="globalLangSelect" style="background: rgba(255,255,255,0.9); border: 1px solid #d1d5db; color: #111827; border-radius: 6px; padding: 4px 6px; font-size: 12px; outline: none;">
        <option value="en">English</option>
        <option value="zh-CN">中文</option>
        <option value="ja">日本語</option>
      </select>
    </div>
    <header>
      <h1 id="uiH1">Testcase Reader</h1>
      <div class="actions">
        <div class="tabs" role="tablist" aria-label="Test levels">
          <button id="tabUnit" class="tabBtn" type="button"></button>
          <button id="tabIntegration" class="tabBtn" type="button"></button>
          <button id="tabAcceptance" class="tabBtn" type="button"></button>
        </div>
      </div>
    </header>
    <main>
      <section class="panel split">
        <div class="hd">
          <span class="pill" id="currentFilePill">-</span>
          <div class="row" style="margin-left:auto">
            <label id="uiPriority">Priority</label>
            <select id="priority">
              <option value="" id="uiAll2">All</option>
              <option value="P0">P0</option>
              <option value="P1">P1</option>
              <option value="P2">P2</option>
            </select>
            <label id="uiSearch">Search</label>
            <input id="q" type="text" placeholder="id / title / function / scenario" id="uiSearchInput" />
          </div>
        </div>
        <div class="rightBody" id="right">
          <div id="summary" class="bd row"></div>
          <div id="tableWrap" class="tableWrap empty"></div>
          <div class="detailWrap" id="detail" class="empty"></div>
        </div>
      </section>
    </main>
    <script>

      const i18n = {
        en: {
          title: "Testcase Reader",
          tabUnit: "Unit",
          tabIntegration: "Integration",
          tabAcceptance: "Acceptance",
          current: "Current",
          loading: "Loading...",
          missing: "Missing",
          priority: "Priority",
          search: "Search",
          searchPlaceholder: "id / title / function / scenario",
          emptyTable: "No test cases loaded.",
          emptyDetail: "Select a test case row to view details.",
          all: "All",
          tableCols: ["ID", "Level", "Priority", "Title", "Function", "Scenario"],
          total: "Total",
          summary: "{0} cases loaded.",
          kPre: "Preconditions",
          kSteps: "Steps",
          kExpected: "Expected Result",
          kTags: "Tags",
          kFunction: "Function",
          kScenario: "Scenario",
          kAuto: "Automation"
        },
        "zh-CN": {
          title: "测试用例阅读器",
          tabUnit: "单元测试",
          tabIntegration: "集成测试",
          tabAcceptance: "验收用例",
          current: "当前",
          loading: "加载中...",
          missing: "缺失",
          priority: "优先级",
          search: "搜索",
          searchPlaceholder: "编号 / 标题 / 功能 / 场景",
          emptyTable: "未加载任何测试用例。",
          emptyDetail: "请点击表格行以查看用例详情。",
          all: "全部",
          tableCols: ["编号", "级别", "优先级", "标题", "关联功能", "关联场景"],
          total: "共计",
          summary: "已加载 {0} 条用例。",
          kPre: "前置条件",
          kSteps: "操作步骤",
          kExpected: "预期结果",
          kTags: "标签",
          kFunction: "关联功能",
          kScenario: "关联场景",
          kAuto: "自动化"
        },
        ja: {
          title: "テストケースリーダー",
          tabUnit: "単体",
          tabIntegration: "結合",
          tabAcceptance: "受入",
          current: "現在",
          loading: "読み込み中...",
          missing: "なし",
          priority: "優先度",
          search: "検索",
          searchPlaceholder: "ID / タイトル / 機能 / シナリオ",
          emptyTable: "テストケースが読み込まれていません。",
          emptyDetail: "行をクリックしてテストケースの詳細を表示します。",
          all: "すべて",
          tableCols: ["ID", "レベル", "優先度", "タイトル", "関連機能", "関連シナリオ"],
          total: "合計",
          summary: "{0} 件のケースを読み込みました。",
          kPre: "前提条件",
          kSteps: "操作手順",
          kExpected: "期待される結果",
          kTags: "タグ",
          kFunction: "関連機能",
          kScenario: "関連シナリオ",
          kAuto: "自動化"
        }
      };

      let currentLang = "en";
      function t(key) { return i18n[currentLang][key] || i18n["en"][key] || key; }

      const state = {
        datasets: {
          unit: { key: "unit", labelKey: "tabUnit", path: "./单元测试/unit_test_cases.json", cases: [], ok: null },
          integration: { key: "integration", labelKey: "tabIntegration", path: "./集成测试/integration_test_cases.json", cases: [], ok: null },
          acceptance: { key: "acceptance", labelKey: "tabAcceptance", path: "./验收用例/acceptance_cases.json", cases: [], ok: null },
        },
        activeKey: "unit",
        selectedCaseId: null,
      };

      function normalizeCase(c) {
        const level = (c.level || "").toString();
        const id = (c.id || "").toString();
        const fn = c.function || {};
        const sc = c.scenario || {};
        return {
          raw: c,
          id,
          level,
          priority: (c.priority || "").toString(),
          category: (c.category || "").toString(),
          operation: (c.operation || "").toString(),
          functionSlug: (fn.slug || "").toString(),
          functionPath: (fn.path || "").toString(),
          functionName: (fn.name || "").toString(),
          scenarioName: (sc.name || "").toString(),
          title: (c.title || "").toString(),
        };
      }

      function stripJsonExt(name) {
        return name.endsWith(".json") ? name.slice(0, -5) : name;
      }

      function renderSummary(list) {
        const byLevel = {};
        for (const c of list) byLevel[c.level] = (byLevel[c.level] || 0) + 1;
        const keys = Object.keys(byLevel).sort();
        const el = document.getElementById("summary");
        el.innerHTML = "";
        const total = document.createElement("span");
        total.className = "pill";
        total.textContent = `Total: ${list.length}`;
        el.appendChild(total);
        for (const k of keys) {
          const pill = document.createElement("span");
          pill.className = "pill";
          pill.textContent = `${k}: ${byLevel[k]}`;
          el.appendChild(pill);
        }
      }

      function matchFilter(c, level, priority, q) {
        if (level && c.level !== level) return false;
        if (priority && c.priority !== priority) return false;
        if (!q) return true;
        const hay = [
          c.id,
          c.title,
          c.functionPath,
          c.functionName,
          c.functionSlug,
          c.scenarioName,
          c.category,
          c.operation,
        ].join(" ").toLowerCase();
        return hay.includes(q.toLowerCase());
      }

      function renderTable() {
        const priority = document.getElementById("priority").value;
        const q = document.getElementById("q").value.trim();
        const cases = state.datasets[state.activeKey] ? state.datasets[state.activeKey].cases : [];
        const list = cases.filter((c) => matchFilter(c, "", priority, q));
        renderSummary(list);

        const wrap = document.getElementById("tableWrap");
        if (list.length === 0) {
          wrap.className = "tableWrap empty";
          wrap.textContent = t("emptyTable");
          return;
        }

        const table = document.createElement("table");
        const thead = document.createElement("thead");
        const trh = document.createElement("tr");
        const headers = currentLang === "zh-CN"
          ? ["编号", "级别", "关联功能", "标题", "优先级", "类别", "关联场景"]
          : currentLang === "ja"
            ? ["ID", "レベル", "関連機能", "タイトル", "優先度", "分類", "関連シナリオ"]
            : ["ID", "Level", "Function", "Title", "Priority", "Category", "Scenario"];
        for (const h of headers) {
          const th = document.createElement("th");
          th.textContent = h;
          trh.appendChild(th);
        }
        thead.appendChild(trh);
        table.appendChild(thead);

        const tbody = document.createElement("tbody");
        for (const c of list) {
          const tr = document.createElement("tr");
          tr.dataset.id = c.id;
          const cols = [
            c.id,
            c.level,
            c.functionPath || c.functionName || c.functionSlug,
            c.title,
            c.priority,
            [c.category, c.operation].filter(Boolean).join(" / "),
            c.scenarioName,
          ];
          for (const v of cols) {
            const td = document.createElement("td");
            td.textContent = v || "";
            tr.appendChild(td);
          }
          tr.addEventListener("click", () => selectCase(c.id));
          tbody.appendChild(tr);
        }
        table.appendChild(tbody);

        wrap.className = "tableWrap";
        wrap.innerHTML = "";
        wrap.appendChild(table);
      }

      function renderDetail(c) {
        const el = document.getElementById("detail");
        if (!c) {
          el.className = "detailWrap empty";
          el.textContent = t("emptyDetail");
          return;
        }
        const raw = c.raw;
        const parts = [];
        const kv = (k, v) => {
          parts.push(`<div class="k">${k}</div><div class="v">${v}</div>`);
        };
        kv("ID", escapeHtml(raw.id || ""));
        kv("Level", escapeHtml(raw.level || ""));
        kv("Function", escapeHtml(((raw.function && raw.function.path) || (raw.function && raw.function.name) || (raw.function && raw.function.slug) || "")));
        kv("Title", escapeHtml(raw.title || ""));
        kv("Priority", escapeHtml(raw.priority || ""));
        kv("Category", escapeHtml(raw.category || ""));
        if (raw.operation) kv("Operation", escapeHtml(raw.operation));
        kv("Scenario", escapeHtml(((raw.scenario && raw.scenario.name) || "")));
        if (raw.scenario && Array.isArray(raw.scenario.node_chain)) kv("Node chain", escapeHtml(raw.scenario.node_chain.join(" → ")));
        kv("Preconditions", escapeHtml(Array.isArray(raw.preconditions) ? raw.preconditions.join("\n") : ""));
        kv("Steps", escapeHtml(Array.isArray(raw.steps) ? raw.steps.map((s, i) => `${i + 1}. ${s}`).join("\n") : ""));
        kv("Expected", escapeHtml(Array.isArray(raw.expected) ? raw.expected.map((s) => `- ${s}`).join("\n") : ""));
        kv("Data setup", escapeHtml(Array.isArray(raw.data_setup) ? raw.data_setup.join("\n") : ""));
        kv("Notes", escapeHtml(Array.isArray(raw.notes) ? raw.notes.join("\n") : ""));
        el.className = "detailWrap";
        el.innerHTML = parts.join("");
      }

      function escapeHtml(s) {
        return String(s)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll("\"", "&quot;")
          .replaceAll("'", "&#039;");
      }

      function selectCase(id) {
        state.selectedCaseId = id;
        const cases = state.datasets[state.activeKey] ? state.datasets[state.activeKey].cases : [];
        const c = cases.find((x) => x.id === id);
        renderDetail(c);
      }

      async function parseJsonCases(text) {
        const parsed = JSON.parse(text);
        const cases = Array.isArray(parsed) ? parsed : (Array.isArray(parsed.cases) ? parsed.cases : []);
        return cases.map(normalizeCase).filter((c) => c.id);
      }

      function setActive(key) {
        state.activeKey = key;
        state.selectedCaseId = null;
        const ds = state.datasets[state.activeKey];
        document.getElementById("currentFilePill").textContent = `${t("current")}: ${t(ds.labelKey)} (${ds.ok ? "OK" : t("missing")})`;
        renderDetail(null);
        renderTabs();
        renderTable();
      }

      function applyLang() {
        document.getElementById("uiTitle").textContent = t("title");
        document.title = t("title");
        document.getElementById("uiH1").textContent = t("title");
        document.getElementById("uiPriority").textContent = t("priority");
        document.getElementById("uiSearch").textContent = t("search");
        const q = document.getElementById("q");
        q.placeholder = t("searchPlaceholder");
        document.getElementById("uiAll2").textContent = t("all");
        renderTabs();
        setActive(state.activeKey);
      }

      function renderTabs() {
        const btns = {
          unit: document.getElementById("tabUnit"),
          integration: document.getElementById("tabIntegration"),
          acceptance: document.getElementById("tabAcceptance"),
        };
        for (const k of Object.keys(btns)) {
          const ds = state.datasets[k];
          const btn = btns[k];
          if (!btn) continue;
          btn.textContent = t(ds.labelKey);
          btn.className = "tabBtn" + (state.activeKey === k ? " tabBtnActive" : "");
          btn.disabled = ds.ok === false;
        }
      }

      async function loadAll() {
        for (const k of Object.keys(state.datasets)) {
          const ds = state.datasets[k];
          ds.ok = null;
          ds.cases = [];
        }
        renderTabs();
        document.getElementById("tableWrap").className = "tableWrap empty";
        document.getElementById("tableWrap").textContent = t("loading");

        for (const k of Object.keys(state.datasets)) {
          const ds = state.datasets[k];
          try {
            const res = await fetch(ds.path, { cache: "no-store" });
            if (!res.ok) throw new Error(String(res.status));
            const text = await res.text();
            ds.cases = await parseJsonCases(text);
            for (const c of ds.cases) {
              if (!c.level) c.level = ds.key;
              if (c.raw && !c.raw.level) c.raw.level = ds.key;
            }
            ds.ok = true;
          } catch {
            ds.cases = [];
            ds.ok = false;
          }
        }

        const firstOk = Object.keys(state.datasets).find((k) => state.datasets[k].ok);
        state.activeKey = firstOk || "unit";
        renderTabs();
        setActive(state.activeKey);
      }

      const langSelect = document.getElementById("globalLangSelect");
      (function initLang() {
        const navLang = navigator.language || "";
        if (navLang.startsWith("zh")) currentLang = "zh-CN";
        else if (navLang.startsWith("ja")) currentLang = "ja";
        else currentLang = "en";
        langSelect.value = currentLang;
        document.documentElement.lang = currentLang === "zh-CN" ? "zh-CN" : currentLang;
      })();
      langSelect.addEventListener("change", () => {
        currentLang = langSelect.value;
        document.documentElement.lang = currentLang === "zh-CN" ? "zh-CN" : currentLang;
        applyLang();
      });

      document.getElementById("tabUnit").addEventListener("click", () => setActive("unit"));
      document.getElementById("tabIntegration").addEventListener("click", () => setActive("integration"));
      document.getElementById("tabAcceptance").addEventListener("click", () => setActive("acceptance"));
      document.getElementById("priority").addEventListener("change", renderTable);
      document.getElementById("q").addEventListener("input", renderTable);

      applyLang();
      loadAll();
    </script>
  </body>
</html>
