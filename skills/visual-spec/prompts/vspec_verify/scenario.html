<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>场景确认</title>
    <style>
      :root {
        --bg: #0b1020;
        --panel: rgba(255, 255, 255, 0.06);
        --panel-2: rgba(255, 255, 255, 0.08);
        --border: rgba(255, 255, 255, 0.12);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.72);
        --muted-2: rgba(255, 255, 255, 0.6);
        --accent: #7aa2ff;
        --danger: #ff6b6b;
        --warn: #ffd166;
        --ok: #34d399;
        --shadow: 0 18px 48px rgba(0, 0, 0, 0.32);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji",
          "Segoe UI Emoji";
        color: var(--text);
        background: radial-gradient(1200px 900px at 20% -10%, rgba(122, 162, 255, 0.22), transparent 60%),
          radial-gradient(900px 700px at 110% 0%, rgba(52, 211, 153, 0.16), transparent 55%),
          radial-gradient(900px 700px at 90% 120%, rgba(255, 209, 102, 0.14), transparent 60%), var(--bg);
      }
      a {
        color: inherit;
      }
      .app {
        height: 100%;
        display: grid;
        grid-template-columns: 360px 1fr;
        gap: 14px;
        padding: 14px;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        box-shadow: var(--shadow);
        overflow: hidden;
        min-width: 0;
        min-height: 0;
      }
      .panelHeader {
        padding: 12px 12px 10px 12px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .panelHeaderTitle {
        font-weight: 700;
        letter-spacing: 0.2px;
        font-size: 14px;
      }
      .panelHeaderMeta {
        margin-left: auto;
        font-size: 12px;
        color: var(--muted);
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .btn {
        appearance: none;
        border: 1px solid var(--border);
        background: var(--panel-2);
        color: var(--text);
        padding: 8px 10px;
        border-radius: 10px;
        font-size: 12px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .btn:hover {
        border-color: rgba(255, 255, 255, 0.22);
      }
      .btnPrimary {
        border-color: rgba(122, 162, 255, 0.5);
        background: rgba(122, 162, 255, 0.18);
      }
      .btnDanger {
        border-color: rgba(255, 107, 107, 0.55);
        background: rgba(255, 107, 107, 0.12);
      }
      .chip {
        font-size: 12px;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.06);
        color: var(--muted);
        white-space: nowrap;
      }
      .chipOk {
        border-color: rgba(52, 211, 153, 0.55);
        background: rgba(52, 211, 153, 0.12);
        color: rgba(209, 250, 229, 0.95);
      }
      .chipWarn {
        border-color: rgba(255, 209, 102, 0.6);
        background: rgba(255, 209, 102, 0.14);
        color: rgba(255, 241, 210, 0.96);
      }
      .chipDanger {
        border-color: rgba(255, 107, 107, 0.6);
        background: rgba(255, 107, 107, 0.14);
        color: rgba(255, 230, 230, 0.96);
      }
      .left {
        display: grid;
        grid-template-rows: auto 1fr;
      }
      .leftBody {
        padding: 10px;
        display: grid;
        grid-template-rows: 1fr;
        min-height: 0;
      }
      .input {
        width: 100%;
        appearance: none;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.12);
        color: var(--text);
        padding: 10px 10px;
        border-radius: 10px;
        font-size: 13px;
        outline: none;
      }
      .input::placeholder {
        color: rgba(255, 255, 255, 0.45);
      }
      .list {
        overflow: auto;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.1);
      }
      .item {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        padding: 10px 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        cursor: pointer;
      }
      .item:last-child {
        border-bottom: none;
      }
      .item:hover {
        background: rgba(255, 255, 255, 0.04);
      }
      .itemActive {
        background: rgba(122, 162, 255, 0.12);
      }
      .itemTitle {
        display: flex;
        align-items: baseline;
        gap: 8px;
        min-width: 0;
      }
      .itemId {
        font-weight: 800;
        font-size: 12px;
        color: rgba(122, 162, 255, 0.95);
      }
      .itemName {
        font-size: 13px;
        color: var(--text);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .main {
        display: grid;
        grid-template-rows: auto 1fr;
        min-height: 0;
      }
      .mainBody {
        padding: 12px;
        overflow: auto;
      }
      .sceneHeader {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        padding-bottom: 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        margin-bottom: 12px;
      }
      .sceneTitle {
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 0.2px;
      }
      .sceneSub {
        color: var(--muted);
        font-size: 12px;
      }
      .statusGroup {
        margin-left: auto;
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      .radioGroup {
        display: inline-flex;
        border: 1px solid var(--border);
        border-radius: 999px;
        overflow: hidden;
        background: rgba(0, 0, 0, 0.12);
      }
      .radioBtn {
        padding: 8px 10px;
        font-size: 12px;
        cursor: pointer;
        color: var(--muted);
        border-right: 1px solid rgba(255, 255, 255, 0.08);
        user-select: none;
      }
      .radioBtn:last-child {
        border-right: none;
      }
      .radioBtnActive {
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
      }
      .noteBox {
        margin-top: 10px;
        display: grid;
        gap: 8px;
      }
      .noteLabel {
        font-size: 12px;
        color: var(--muted);
      }
      .textArea {
        min-height: 90px;
        resize: vertical;
        line-height: 1.4;
      }
      .nodes {
        display: grid;
        gap: 12px;
        margin-top: 14px;
      }
      .nodeRow {
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        background: rgba(0, 0, 0, 0.12);
      }
      .nodeHead {
        display: flex;
        gap: 10px;
        align-items: center;
        padding: 10px 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
      }
      .nodeType {
        font-weight: 800;
        font-size: 12px;
        color: rgba(255, 209, 102, 0.95);
        letter-spacing: 0.2px;
      }
      .nodeLabel {
        font-size: 13px;
        color: var(--text);
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .nodeBody {
        padding: 12px;
        display: grid;
        grid-template-columns: 260px 1fr;
        gap: 12px;
        align-items: start;
      }
      .thumb {
        height: 160px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: linear-gradient(135deg, rgba(122, 162, 255, 0.25), rgba(52, 211, 153, 0.16)),
          radial-gradient(800px 240px at 10% 10%, rgba(255, 255, 255, 0.18), transparent 55%);
        position: relative;
        overflow: hidden;
      }
      .thumb::after {
        content: "预览占位";
        position: absolute;
        right: 10px;
        bottom: 10px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.72);
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(0, 0, 0, 0.18);
        backdrop-filter: blur(6px);
      }
      .kv {
        display: grid;
        gap: 10px;
      }
      .kvRow {
        display: grid;
        grid-template-columns: 90px 1fr;
        gap: 10px;
        font-size: 13px;
        align-items: baseline;
      }
      .kvKey {
        color: var(--muted);
      }
      .kvVal {
        color: var(--text);
        word-break: break-word;
      }
      .routeMono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.86);
      }
      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 6px;
      }
      .empty {
        padding: 12px;
        border: 1px dashed rgba(255, 255, 255, 0.2);
        border-radius: 14px;
        color: var(--muted);
        background: rgba(0, 0, 0, 0.12);
      }
      @media (max-width: 980px) {
        .app {
          grid-template-columns: 1fr;
          grid-template-rows: 360px 1fr;
        }
        .nodeBody {
          grid-template-columns: 1fr;
        }
        .thumb {
          height: 140px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="panel left">
        <div class="panelHeader">
          <div class="panelHeaderTitle">场景列表</div>
          <div class="panelHeaderMeta">
            <span id="sceneCount" class="chip">0</span>
          </div>
        </div>
        <div class="leftBody">
          <div id="sceneList" class="list" role="listbox"></div>
        </div>
      </div>

      <div class="panel main">
        <div class="panelHeader">
          <div class="panelHeaderTitle">场景确认</div>
          <div class="panelHeaderMeta">
            <span id="generatedAt" class="chip">-</span>
          </div>
        </div>
        <div class="mainBody">
          <div id="emptyState" class="empty">未加载任何场景数据。请确保生成时已将场景 JSON 写入到本页面。</div>
          <div id="sceneView" style="display: none">
            <div class="sceneHeader">
              <div>
                <div id="sceneTitle" class="sceneTitle">-</div>
                <div id="sceneSub" class="sceneSub">-</div>
              </div>
              <div class="statusGroup">
                <span id="statusChip" class="chip">待确认</span>
                <div id="statusGroup" class="radioGroup" role="radiogroup" aria-label="确认状态">
                  <div class="radioBtn" data-status="pending">待确认</div>
                  <div class="radioBtn" data-status="confirmed">已确认</div>
                  <div class="radioBtn" data-status="need_change">需修改</div>
                </div>
              </div>
            </div>

            <div class="noteBox">
              <div class="noteLabel">备注（可选）：</div>
              <textarea id="note" class="input textArea" placeholder="记录需要修改的点、补充说明、风险等"></textarea>
            </div>

            <div id="nodes" class="nodes"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        const LS_KEY = "__vspec_scenario_confirmations__";

        function safeJsonParse(text, fallback) {
          try {
            return JSON.parse(text);
          } catch {
            return fallback;
          }
        }

        function nowIso() {
          return new Date().toISOString();
        }

        async function loadScenarioData() {
          const url = "./scenario.json";
          const res = await fetch(url, { cache: "no-store" });
          if (!res.ok) throw new Error(`Failed to load ${url}: ${res.status}`);
          return await res.json();
        }

        function normalizeNode(node) {
          const type = String(node?.type || "").trim();
          const label = String(node?.label || node?.name || "").trim();
          const route = String(node?.route || "").trim();
          const mobileRoute = String(node?.mobileRoute || "").trim();
          const pageName = String(node?.pageName || "").trim();

          const defaultRouteMap = {
            apply: "/apply",
            approve: "/approve",
            "execute-start": "/execute",
            "execute-end": "/execute",
            execute: "/execute",
            change: "/change",
            cancel: "/cancel",
          };

          return {
            type,
            label: label || type || "-",
            route: route || defaultRouteMap[type] || "",
            mobileRoute,
            pageName,
          };
        }

        function normalizeScenario(scene) {
          const id = String(scene?.id || scene?.no || scene?.code || "").trim();
          const name = String(scene?.name || scene?.title || "").trim();
          const nodes = Array.isArray(scene?.nodes) ? scene.nodes.map(normalizeNode) : [];
          return { id, name, nodes };
        }

        function getStatusLabel(status) {
          if (status === "confirmed") return "已确认";
          if (status === "need_change") return "需修改";
          return "待确认";
        }

        function getStatusChipClass(status) {
          if (status === "confirmed") return "chip chipOk";
          if (status === "need_change") return "chip chipDanger";
          return "chip chipWarn";
        }

        function loadStore() {
          return safeJsonParse(localStorage.getItem(LS_KEY) || "{}", {});
        }

        function saveStore(store) {
          localStorage.setItem(LS_KEY, JSON.stringify(store));
        }

        const $sceneCount = document.getElementById("sceneCount");
        const $generatedAt = document.getElementById("generatedAt");
        const $sceneList = document.getElementById("sceneList");
        const $emptyState = document.getElementById("emptyState");
        const $sceneView = document.getElementById("sceneView");
        const $sceneTitle = document.getElementById("sceneTitle");
        const $sceneSub = document.getElementById("sceneSub");
        const $statusChip = document.getElementById("statusChip");
        const $statusGroup = document.getElementById("statusGroup");
        const $note = document.getElementById("note");
        const $nodes = document.getElementById("nodes");

        let scenarios = [];
        let store = loadStore();
        let activeId = "";

        function getSceneStore(id) {
          const v = store[id] || {};
          const status = v.status === "confirmed" || v.status === "need_change" ? v.status : "pending";
          const note = typeof v.note === "string" ? v.note : "";
          return { status, note };
        }

        function setSceneStore(id, partial) {
          const prev = getSceneStore(id);
          store[id] = { ...prev, ...partial, updatedAt: nowIso() };
          saveStore(store);
        }

        function renderList() {
          const items = scenarios;
          $sceneCount.textContent = String(scenarios.length);
          $sceneList.innerHTML = "";

          for (const s of items) {
            const { status } = getSceneStore(s.id);
            const row = document.createElement("div");
            row.className = "item" + (s.id === activeId ? " itemActive" : "");
            row.addEventListener("click", () => {
              activeId = s.id;
              render();
            });

            const left = document.createElement("div");
            left.className = "itemTitle";

            const id = document.createElement("div");
            id.className = "itemId";
            id.textContent = s.id || "-";

            const name = document.createElement("div");
            name.className = "itemName";
            name.textContent = s.name || "-";

            left.appendChild(id);
            left.appendChild(name);

            const chip = document.createElement("div");
            chip.className = getStatusChipClass(status);
            chip.textContent = getStatusLabel(status);

            row.appendChild(left);
            row.appendChild(chip);
            $sceneList.appendChild(row);
          }
        }

        function setStatusUi(status) {
          $statusChip.className = getStatusChipClass(status);
          $statusChip.textContent = getStatusLabel(status);
          for (const el of Array.from($statusGroup.querySelectorAll(".radioBtn"))) {
            const isActive = el.getAttribute("data-status") === status;
            el.className = "radioBtn" + (isActive ? " radioBtnActive" : "");
          }
        }

        function renderNodes(scene) {
          $nodes.innerHTML = "";
          if (!scene.nodes.length) {
            const empty = document.createElement("div");
            empty.className = "empty";
            empty.textContent = "该场景未提供节点链条数据。请在生成时从 scenarios.md / scenario_details 补齐。";
            $nodes.appendChild(empty);
            return;
          }

          for (const n of scene.nodes) {
            const card = document.createElement("div");
            card.className = "nodeRow";

            const head = document.createElement("div");
            head.className = "nodeHead";

            const t = document.createElement("div");
            t.className = "nodeType";
            t.textContent = n.type || "-";

            const l = document.createElement("div");
            l.className = "nodeLabel";
            l.textContent = n.label || "-";

            head.appendChild(t);
            head.appendChild(l);

            const body = document.createElement("div");
            body.className = "nodeBody";

            const thumb = document.createElement("div");
            thumb.className = "thumb";

            const kv = document.createElement("div");
            kv.className = "kv";

            const r1 = document.createElement("div");
            r1.className = "kvRow";
            r1.innerHTML = `<div class="kvKey">页面</div><div class="kvVal">${escapeHtml(n.pageName || "-")}</div>`;

            const r2 = document.createElement("div");
            r2.className = "kvRow";
            r2.innerHTML = `<div class="kvKey">Web 路由</div><div class="kvVal routeMono">${escapeHtml(
              n.route || "-"
            )}</div>`;

            const r3 = document.createElement("div");
            r3.className = "kvRow";
            r3.innerHTML = `<div class="kvKey">Mobile 路由</div><div class="kvVal routeMono">${escapeHtml(
              n.mobileRoute || "-"
            )}</div>`;

            const actions = document.createElement("div");
            actions.className = "actions";

            const openWeb = document.createElement("a");
            openWeb.className = "btn btnPrimary";
            openWeb.textContent = "打开页面（Web）";
            openWeb.href = n.route ? n.route : "javascript:void(0)";
            openWeb.target = "_blank";
            openWeb.rel = "noopener";
            if (!n.route) openWeb.setAttribute("aria-disabled", "true");

            const openMobile = document.createElement("a");
            openMobile.className = "btn";
            openMobile.textContent = "打开页面（Mobile）";
            openMobile.href = n.mobileRoute ? n.mobileRoute : "javascript:void(0)";
            openMobile.target = "_blank";
            openMobile.rel = "noopener";
            if (!n.mobileRoute) openMobile.setAttribute("aria-disabled", "true");

            actions.appendChild(openWeb);
            actions.appendChild(openMobile);

            kv.appendChild(r1);
            kv.appendChild(r2);
            kv.appendChild(r3);
            kv.appendChild(actions);

            body.appendChild(thumb);
            body.appendChild(kv);

            card.appendChild(head);
            card.appendChild(body);
            $nodes.appendChild(card);
          }
        }

        function escapeHtml(s) {
          return String(s)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
        }

        function renderScene() {
          const scene = scenarios.find((s) => s.id === activeId) || scenarios[0];
          if (!scene) return;

          const saved = getSceneStore(scene.id);
          $sceneTitle.textContent = `${scene.id || "-"} · ${scene.name || "-"}`;
          $sceneSub.textContent = `节点数：${scene.nodes.length}`;
          $note.value = saved.note || "";
          setStatusUi(saved.status);
          renderNodes(scene);
        }

        function render() {
          renderList();
          if (!scenarios.length) return;
          $emptyState.style.display = "none";
          $sceneView.style.display = "block";
          renderScene();
        }

        $statusGroup.addEventListener("click", (e) => {
          const target = e.target;
          if (!(target instanceof HTMLElement)) return;
          const st = target.getAttribute("data-status");
          if (!st) return;
          if (!activeId) return;
          setSceneStore(activeId, { status: st });
          render();
        });

        $note.addEventListener("change", () => {
          if (!activeId) return;
          setSceneStore(activeId, { note: $note.value || "" });
          renderList();
        });

        (async function init() {
          try {
            const data = await loadScenarioData();
            const scenariosRaw = Array.isArray(data?.scenarios) ? data.scenarios : [];
            scenarios = scenariosRaw.map(normalizeScenario).filter((s) => s.id || s.name);
            activeId = scenarios.length ? scenarios[0].id : "";
            $generatedAt.textContent = data?.meta?.generatedAt ? String(data.meta.generatedAt) : "-";

            if (scenarios.length) {
              $emptyState.style.display = "none";
              $sceneView.style.display = "block";
              render();
            } else {
              $sceneCount.textContent = "0";
              $emptyState.style.display = "block";
              $sceneView.style.display = "none";
            }
          } catch (err) {
            $sceneCount.textContent = "0";
            $generatedAt.textContent = "-";
            $emptyState.textContent = "未加载任何场景数据。请确保 /scenario.html 同目录下存在 scenario.json，并通过开发服务器访问（例如 Vite dev server）。";
            $emptyState.style.display = "block";
            $sceneView.style.display = "none";
          }
        })();
      })();
    </script>
  </body>
</html>
