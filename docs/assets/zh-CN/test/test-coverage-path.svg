<svg xmlns="http://www.w3.org/2000/svg" width="960" height="320" viewBox="0 0 960 320">
  <defs>
    <style>
      .bg{fill:#ffffff}
      .card{fill:#f8fafc;stroke:#e5e7eb;stroke-width:2}
      .title{font:800 16px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;fill:#111827}
      .muted{font:500 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;fill:#6b7280}
      .node{fill:#ffffff;stroke:#e5e7eb;stroke-width:2}
      .hi{fill:#eff6ff;stroke:#bfdbfe;stroke-width:2}
      .text{font:700 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;fill:#111827}
      .edge{stroke:#111827;stroke-width:2.5;fill:none}
      .soft{stroke:#9ca3af;stroke-width:2.5;fill:none;stroke-dasharray:6 6}
      .lbl{font:700 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;fill:#2563eb}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#111827"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="960" height="320"/>
  <text class="title" x="40" y="40">路径覆盖（Path Coverage）：入口到出口的组合路径</text>
  <text class="muted" x="40" y="62">参考示例：两个判定点理论上有 4 条路径（T/T、T/F、F/T、F/F），用例需覆盖到每条可行路径</text>

  <rect class="card" x="40" y="84" width="880" height="206" rx="16"/>
  <rect class="hi" x="120" y="132" width="140" height="44" rx="12"/>
  <text class="text" x="190" y="160" text-anchor="middle">入口</text>

  <rect class="node" x="320" y="110" width="160" height="44" rx="12"/>
  <text class="text" x="400" y="138" text-anchor="middle">判定 A</text>
  <rect class="node" x="320" y="170" width="160" height="44" rx="12"/>
  <text class="text" x="400" y="198" text-anchor="middle">判定 B</text>

  <rect class="hi" x="560" y="110" width="160" height="44" rx="12"/>
  <text class="text" x="640" y="138" text-anchor="middle">路径 1</text>
  <rect class="hi" x="560" y="170" width="160" height="44" rx="12"/>
  <text class="text" x="640" y="198" text-anchor="middle">路径 2</text>

  <rect class="node" x="780" y="132" width="120" height="44" rx="12"/>
  <text class="text" x="840" y="160" text-anchor="middle">出口</text>

  <path class="edge" d="M260 154 L310 132" marker-end="url(#arrow)"/>
  <path class="edge" d="M260 154 L310 192" marker-end="url(#arrow)"/>
  <path class="edge" d="M480 132 L550 132" marker-end="url(#arrow)"/>
  <path class="edge" d="M480 192 L550 192" marker-end="url(#arrow)"/>
  <path class="edge" d="M720 132 L770 154" marker-end="url(#arrow)"/>
  <path class="edge" d="M720 192 L770 154" marker-end="url(#arrow)"/>

  <path class="soft" d="M400 110 C520 40, 680 40, 840 132" />

  <rect class="node" x="120" y="234" width="780" height="46" rx="12"/>
  <text class="lbl" x="140" y="262">示例用例（可参考文章的路径命名）：(2,0,3) 覆盖 T/T；(3,0,1) 覆盖 T/F；(2,1,3) 覆盖 F/T；(1,0,1) 覆盖 F/F</text>
</svg>
