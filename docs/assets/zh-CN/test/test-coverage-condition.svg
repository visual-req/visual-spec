<svg xmlns="http://www.w3.org/2000/svg" width="960" height="320" viewBox="0 0 960 320">
  <defs>
    <style>
      .bg{fill:#ffffff}
      .card{fill:#f8fafc;stroke:#e5e7eb;stroke-width:2}
      .title{font:800 16px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;fill:#111827}
      .muted{font:500 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;fill:#6b7280}
      .ok{fill:#ecfdf5;stroke:#a7f3d0;stroke-width:2}
      .bad{fill:#fff1f2;stroke:#fecdd3;stroke-width:2}
      .chip{fill:#eff6ff;stroke:#bfdbfe;stroke-width:2}
      .code{font:800 13px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;fill:#111827}
      .t2{font:700 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;fill:#111827}
      .lbl{font:700 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;fill:#2563eb}
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="960" height="320"/>
  <text class="title" x="40" y="40">条件覆盖（Condition Coverage）：原子条件都翻转过吗？</text>
  <text class="muted" x="40" y="62">参考示例：把复合条件拆成原子条件，要求每个原子条件都至少取到过 True 和 False</text>

  <rect class="card" x="40" y="84" width="880" height="206" rx="16"/>
  <rect class="chip" x="80" y="110" width="520" height="44" rx="14"/>
  <text class="code" x="96" y="139">a &gt; 1 &amp;&amp; b === 0</text>
  <rect class="chip" x="80" y="160" width="520" height="44" rx="14"/>
  <text class="code" x="96" y="189">a === 2 || x &gt; 1</text>

  <rect class="ok" x="620" y="110" width="140" height="44" rx="14"/>
  <text class="t2" x="690" y="138" text-anchor="middle">a&gt;1: T/F</text>
  <rect class="ok" x="780" y="110" width="140" height="44" rx="14"/>
  <text class="t2" x="850" y="138" text-anchor="middle">b==0: T/F</text>

  <rect class="ok" x="620" y="160" width="140" height="44" rx="14"/>
  <text class="t2" x="690" y="188" text-anchor="middle">a==2: T/F</text>
  <rect class="ok" x="780" y="160" width="140" height="44" rx="14"/>
  <text class="t2" x="850" y="188" text-anchor="middle">x&gt;1: T/F</text>

  <rect class="bad" x="80" y="220" width="520" height="44" rx="14"/>
  <text class="t2" x="340" y="248" text-anchor="middle">注意：条件覆盖不等价于分支覆盖（可能仍漏掉某些分支结果）</text>

  <text class="lbl" x="620" y="244">示例用例：</text>
  <text class="lbl" x="620" y="264">(2,0,3) / (2,1,3) / (1,0,1) + 额外边界用例翻转 x&gt;1</text>
</svg>
