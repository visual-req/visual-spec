<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360">
  <defs>
    <style>
      .bg{fill:#ffffff}
      .card{fill:#f8fafc;stroke:#e5e7eb;stroke-width:2}
      .title{font:700 18px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;fill:#111827}
      .muted{font:500 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;fill:#6b7280}
      .cell{fill:#ffffff;stroke:#e5e7eb;stroke-width:2}
      .head{fill:#eff6ff;stroke:#bfdbfe;stroke-width:2}
      .text{font:700 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;fill:#111827}
      .text2{font:600 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;fill:#374151}
      .note{fill:#ecfdf5;stroke:#a7f3d0;stroke-width:2}
      .noteText{font:600 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;fill:#166534}
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="960" height="360"/>
  <text class="title" x="40" y="56">行动 - 课程映射（示例）</text>
  <text class="muted" x="40" y="80">把“对象 × 行动 × 状态变化 × 重点规格”放到一张表里，快速补齐入口、权限、校验与状态机</text>

  <rect class="card" x="40" y="104" width="880" height="216" rx="16"/>

  <rect class="head" x="80" y="140" width="170" height="40" rx="10"/>
  <text class="text" x="165" y="166" text-anchor="middle">课程对象</text>
  <rect class="head" x="260" y="140" width="220" height="40" rx="10"/>
  <text class="text" x="370" y="166" text-anchor="middle">行动（用户/系统）</text>
  <rect class="head" x="490" y="140" width="190" height="40" rx="10"/>
  <text class="text" x="585" y="166" text-anchor="middle">期望状态变化</text>
  <rect class="head" x="690" y="140" width="210" height="40" rx="10"/>
  <text class="text" x="795" y="166" text-anchor="middle">重点规格</text>

  <rect class="cell" x="80" y="190" width="170" height="38" rx="10"/>
  <text class="text2" x="165" y="214" text-anchor="middle">课程</text>
  <rect class="cell" x="260" y="190" width="220" height="38" rx="10"/>
  <text class="text2" x="370" y="214" text-anchor="middle">浏览 / 搜索</text>
  <rect class="cell" x="490" y="190" width="190" height="38" rx="10"/>
  <text class="text2" x="585" y="214" text-anchor="middle">无</text>
  <rect class="cell" x="690" y="190" width="210" height="38" rx="10"/>
  <text class="text2" x="795" y="214" text-anchor="middle">筛选 / 排序 / 可见性</text>

  <rect class="cell" x="80" y="234" width="170" height="38" rx="10"/>
  <text class="text2" x="165" y="258" text-anchor="middle">课程</text>
  <rect class="cell" x="260" y="234" width="220" height="38" rx="10"/>
  <text class="text2" x="370" y="258" text-anchor="middle">购买 / 报名</text>
  <rect class="cell" x="490" y="234" width="190" height="38" rx="10"/>
  <text class="text2" x="585" y="258" text-anchor="middle">已报名</text>
  <rect class="cell" x="690" y="234" width="210" height="38" rx="10"/>
  <text class="text2" x="795" y="258" text-anchor="middle">支付 / 幂等 / 访问控制</text>

  <rect class="cell" x="80" y="278" width="170" height="38" rx="10"/>
  <text class="text2" x="165" y="302" text-anchor="middle">课时</text>
  <rect class="cell" x="260" y="278" width="220" height="38" rx="10"/>
  <text class="text2" x="370" y="302" text-anchor="middle">播放 / 完成</text>
  <rect class="cell" x="490" y="278" width="190" height="38" rx="10"/>
  <text class="text2" x="585" y="302" text-anchor="middle">进度更新</text>
  <rect class="cell" x="690" y="278" width="210" height="38" rx="10"/>
  <text class="text2" x="795" y="302" text-anchor="middle">口径 / 重试 / 离线同步</text>

  <rect class="note" x="80" y="326" width="820" height="0" rx="10"/>
  <text class="noteText" x="480" y="332" text-anchor="middle"></text>
</svg>
