<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360">
  <defs>
    <style>
      .bg{fill:#ffffff}
      .card{fill:#f8fafc;stroke:#e5e7eb;stroke-width:2}
      .title{font:700 18px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;fill:#111827}
      .muted{font:500 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;fill:#6b7280}
      .node{fill:#ffffff;stroke:#e5e7eb;stroke-width:2}
      .nodeA{fill:#eff6ff;stroke:#bfdbfe;stroke-width:2}
      .nodeB{fill:#ecfdf5;stroke:#a7f3d0;stroke-width:2}
      .text{font:700 13px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;fill:#111827}
      .text2{font:600 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;fill:#374151}
      .arrow{stroke:#111827;stroke-width:2.5;fill:none}
      .blue{stroke:#2563eb;stroke-width:3;fill:none}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#111827"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="960" height="360"/>
  <text class="title" x="40" y="56">闭环思维（Closed-loop Thinking）</text>
  <text class="muted" x="40" y="80">把“点状需求”扩成端到端闭环：前置 → 关键动作 → 后置 → 结束条件 → 可追踪回归</text>

  <rect class="card" x="40" y="104" width="880" height="216" rx="16"/>

  <rect class="nodeA" x="96" y="168" width="190" height="74" rx="16"/>
  <text class="text" x="191" y="198" text-anchor="middle">前置处理</text>
  <text class="text2" x="191" y="220" text-anchor="middle">条件 / 授权 / 校验 / 初始化</text>

  <rect class="node" x="320" y="168" width="190" height="74" rx="16"/>
  <text class="text" x="415" y="198" text-anchor="middle">关键动作</text>
  <text class="text2" x="415" y="220" text-anchor="middle">提交 / 审批 / 执行 / 变更</text>

  <rect class="nodeB" x="544" y="168" width="190" height="74" rx="16"/>
  <text class="text" x="639" y="198" text-anchor="middle">后置处理</text>
  <text class="text2" x="639" y="220" text-anchor="middle">状态同步 / 通知 / 日志 / 对账</text>

  <rect class="node" x="768" y="168" width="140" height="74" rx="16"/>
  <text class="text" x="838" y="198" text-anchor="middle">结束条件</text>
  <text class="text2" x="838" y="220" text-anchor="middle">如何确认完成</text>

  <path class="arrow" d="M286 205 L310 205" marker-end="url(#arrow)"/>
  <path class="arrow" d="M510 205 L534 205" marker-end="url(#arrow)"/>
  <path class="arrow" d="M734 205 L758 205" marker-end="url(#arrow)"/>

  <path class="blue" d="M838 248 C838 300, 170 300, 170 248" marker-end="url(#arrowBlue)"/>
  <text class="muted" x="500" y="314" text-anchor="middle">闭环意味着：每一步都能追踪、能回归、能解释“为什么这样做”</text>
</svg>
