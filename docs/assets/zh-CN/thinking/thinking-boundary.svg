<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360">
  <defs>
    <style>
      .bg{fill:#ffffff}
      .card{fill:#f8fafc;stroke:#e5e7eb;stroke-width:2}
      .title{font:700 18px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;fill:#111827}
      .text{font:500 13px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;fill:#374151}
      .muted{font:500 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;fill:#6b7280}
      .pill{fill:#eff6ff;stroke:#bfdbfe;stroke-width:2}
      .pillText{font:700 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;fill:#1d4ed8}
      .line{stroke:#2563eb;stroke-width:3}
      .dash{stroke:#93c5fd;stroke-width:3;stroke-dasharray:8 6}
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="960" height="360"/>
  <rect class="card" x="140" y="64" width="680" height="232" rx="16"/>
  <text class="title" x="160" y="98">边界思维（Boundary Thinking）</text>
  <text class="muted" x="160" y="122">先画出“范围边界”，再讨论细节：哪些在内，哪些在外，哪些条件下不适用</text>

  <rect class="card" x="260" y="148" width="440" height="124" rx="14"/>
  <text class="title" x="282" y="180">范围（Scope）</text>
  <text class="text" x="282" y="206">目标 / 非目标</text>
  <text class="text" x="282" y="228">覆盖范围 / 不覆盖范围</text>
  <text class="text" x="282" y="250">边界条件：何时生效 / 何时不生效</text>

  <rect class="pill" x="168" y="156" width="82" height="28" rx="14"/>
  <text class="pillText" x="209" y="175" text-anchor="middle">角色</text>
  <rect class="pill" x="168" y="198" width="82" height="28" rx="14"/>
  <text class="pillText" x="209" y="217" text-anchor="middle">数据</text>
  <rect class="pill" x="168" y="240" width="82" height="28" rx="14"/>
  <text class="pillText" x="209" y="259" text-anchor="middle">时间</text>

  <rect class="pill" x="710" y="156" width="92" height="28" rx="14"/>
  <text class="pillText" x="756" y="175" text-anchor="middle">组织</text>
  <rect class="pill" x="710" y="198" width="92" height="28" rx="14"/>
  <text class="pillText" x="756" y="217" text-anchor="middle">权限</text>
  <rect class="pill" x="710" y="240" width="92" height="28" rx="14"/>
  <text class="pillText" x="756" y="259" text-anchor="middle">渠道/端</text>

  <line class="dash" x1="250" y1="170" x2="260" y2="170"/>
  <line class="dash" x1="250" y1="212" x2="260" y2="212"/>
  <line class="dash" x1="250" y1="254" x2="260" y2="254"/>
  <line class="dash" x1="700" y1="170" x2="710" y2="170"/>
  <line class="dash" x1="700" y1="212" x2="710" y2="212"/>
  <line class="dash" x1="700" y1="254" x2="710" y2="254"/>

  <path class="line" d="M156 286 C250 320, 710 320, 804 286" fill="none"/>
  <text class="muted" x="480" y="336" text-anchor="middle">边界一旦明确：讨论会从“争论”变成“对齐与取舍”</text>
</svg>
