<svg xmlns="http://www.w3.org/2000/svg" width="960" height="840" viewBox="0 0 960 840">
  <defs>
    <style>
      .title { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, "Noto Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .label { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, "Noto Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .small { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, "Noto Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .smallMuted { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, "Noto Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect x="0" y="0" width="960" height="840" fill="#ffffff"/>
  <text x="40" y="62" class="title">分层阅读（3 层）：流程 → 结构 → 细节</text>

  <rect x="40" y="110" width="880" height="190" rx="16" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="70" y="160" class="label">第一层：流程（下单买奶茶）</text>

  <g>
    <circle cx="110" cy="235" r="14" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>

    <rect x="150" y="217" width="80" height="36" rx="12" fill="#0ea5e9" stroke="#0ea5e9" stroke-width="2"/>
    <text x="190" y="240" text-anchor="middle" class="small" fill="#ffffff">下单</text>

    <rect x="244" y="217" width="80" height="36" rx="12" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="284" y="240" text-anchor="middle" class="small">支付</text>

    <rect x="338" y="217" width="80" height="36" rx="12" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="378" y="240" text-anchor="middle" class="small">通知</text>

    <rect x="432" y="217" width="80" height="36" rx="12" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="472" y="240" text-anchor="middle" class="small">制作</text>

    <rect x="526" y="217" width="80" height="36" rx="12" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="566" y="240" text-anchor="middle" class="small">完成</text>

    <rect x="620" y="217" width="80" height="36" rx="12" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="660" y="240" text-anchor="middle" class="small">通知</text>

    <rect x="714" y="217" width="80" height="36" rx="12" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="754" y="240" text-anchor="middle" class="small">取餐</text>

    <path d="M124 235 L150 235" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round"/>
    <path d="M230 235 L244 235" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round"/>
    <path d="M324 235 L338 235" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round"/>
    <path d="M418 235 L432 235" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round"/>
    <path d="M512 235 L526 235" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round"/>
    <path d="M606 235 L620 235" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round"/>
    <path d="M700 235 L714 235" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round"/>

    <path d="M236 229 L244 235 L236 241" fill="none" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M330 229 L338 235 L330 241" fill="none" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M424 229 L432 235 L424 241" fill="none" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M518 229 L526 235 L518 241" fill="none" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M612 229 L620 235 L612 241" fill="none" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M706 229 L714 235 L706 241" fill="none" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <path d="M480 300 L480 332" stroke="#64748b" stroke-width="2"/>
  <path d="M474 326 L480 340 L486 326" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="40" y="340" width="880" height="190" rx="16" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="70" y="390" class="label">第二层：结构（下单过程）</text>

  <g>
    <rect x="150" y="412" width="74" height="30" rx="12" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
    <text x="187" y="432" text-anchor="middle" class="small">搜索</text>

    <rect x="150" y="450" width="74" height="30" rx="12" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
    <text x="187" y="470" text-anchor="middle" class="small">分类</text>

    <rect x="150" y="488" width="74" height="30" rx="12" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
    <text x="187" y="508" text-anchor="middle" class="small">推荐</text>

    <rect x="260" y="438" width="120" height="42" rx="12" fill="#16a34a" stroke="#16a34a" stroke-width="2"/>
    <text x="320" y="465" text-anchor="middle" class="small" fill="#ffffff">选择菜单</text>

    <rect x="410" y="438" width="120" height="42" rx="12" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
    <text x="470" y="465" text-anchor="middle" class="small">购物车</text>

    <rect x="560" y="438" width="140" height="42" rx="12" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
    <text x="630" y="465" text-anchor="middle" class="small">确认下单</text>

    <path d="M224 427 L245 459 L260 459" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M224 465 L245 459 L260 459" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M224 503 L245 459 L260 459" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <path d="M380 459 L410 459" stroke="#16a34a" stroke-width="2" stroke-linecap="round"/>
    <path d="M402 453 L410 459 L402 465" fill="none" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <path d="M530 459 L560 459" stroke="#16a34a" stroke-width="2" stroke-linecap="round"/>
    <path d="M552 453 L560 459 L552 465" fill="none" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <path d="M480 530 L480 562" stroke="#64748b" stroke-width="2"/>
  <path d="M474 556 L480 570 L486 556" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="40" y="570" width="880" height="190" rx="16" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="70" y="620" class="label">第三层：细节（规格）</text>

  <g>
    <rect x="196" y="655" width="96" height="36" rx="12" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
    <text x="244" y="678" text-anchor="middle" class="small">原型</text>

    <rect x="314" y="655" width="96" height="36" rx="12" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
    <text x="362" y="678" text-anchor="middle" class="small">校验</text>

    <rect x="432" y="655" width="96" height="36" rx="12" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
    <text x="480" y="678" text-anchor="middle" class="small">权限</text>

    <rect x="550" y="655" width="96" height="36" rx="12" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
    <text x="598" y="678" text-anchor="middle" class="small">逻辑</text>

    <rect x="668" y="655" width="96" height="36" rx="12" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
    <text x="716" y="678" text-anchor="middle" class="small">状态</text>

    <rect x="196" y="705" width="96" height="36" rx="12" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
    <text x="244" y="728" text-anchor="middle" class="small">异常</text>

    <rect x="314" y="705" width="96" height="36" rx="12" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
    <text x="362" y="728" text-anchor="middle" class="small">日志</text>

    <rect x="432" y="705" width="96" height="36" rx="12" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
    <text x="480" y="728" text-anchor="middle" class="small">通知</text>

    <rect x="550" y="705" width="96" height="36" rx="12" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
    <text x="598" y="728" text-anchor="middle" class="small">交互</text>

    <rect x="668" y="705" width="96" height="36" rx="12" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
    <text x="716" y="728" text-anchor="middle" class="small">规则</text>
  </g>
</svg>
