<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-label="时间轴示例">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .edge { stroke: #64748b; stroke-width: 2; fill: none; }
      .edgeDash { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 6 6; }
      .arrow { fill: #64748b; }
      .lane { stroke: #e2e8f0; stroke-width: 1.2; fill: none; }
      .node { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.2; }
      .milestone { fill: #e0f2fe; stroke: #38bdf8; stroke-width: 1.2; }
      .span { fill: #ecfccb; stroke: #84cc16; stroke-width: 1.2; }
      .text { fill: #0f172a; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, "Noto Sans", "PingFang SC", "Hiragino Sans", "Microsoft YaHei", sans-serif; }
      .title { fill: #0f172a; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, "Noto Sans", "PingFang SC", "Hiragino Sans", "Microsoft YaHei", sans-serif; }
      .hint { fill: #334155; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, "Noto Sans", "PingFang SC", "Hiragino Sans", "Microsoft YaHei", sans-serif; }
      .tiny { fill: #475569; font: 11px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, "Noto Sans", "PingFang SC", "Hiragino Sans", "Microsoft YaHei", sans-serif; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path class="arrow" d="M 0 0 L 10 5 L 0 10 z"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1120" height="520"/>
  <text class="title" x="40" y="46">示例：订单生命周期时间轴（主线 + 并行异步 + 时段）</text>
  <text class="hint" x="40" y="70">主线用实线箭头；并行/异步用虚线；时段用条形 span；节点建议包含触发/责任人/输入输出。</text>

  <line class="lane" x1="60" y1="140" x2="1060" y2="140"/>
  <line class="lane" x1="60" y1="310" x2="1060" y2="310"/>
  <text class="hint" x="60" y="124">主线（业务状态）</text>
  <text class="hint" x="60" y="294">并行线（异步/系统任务）</text>

  <path class="edge" d="M 120 140 L 1020 140" marker-end="url(#arrow)"/>
  <circle class="milestone" cx="140" cy="140" r="12"/>
  <circle class="milestone" cx="340" cy="140" r="12"/>
  <circle class="milestone" cx="540" cy="140" r="12"/>
  <circle class="milestone" cx="740" cy="140" r="12"/>
  <circle class="milestone" cx="940" cy="140" r="12"/>

  <rect class="node" x="110" y="164" width="200" height="76" rx="12"/>
  <text class="text" x="210" y="194" text-anchor="middle">T0 申请提交</text>
  <text class="tiny" x="210" y="214" text-anchor="middle">触发：用户点击提交</text>
  <text class="tiny" x="210" y="232" text-anchor="middle">输出：创建单号/状态=SUBMITTED</text>

  <rect class="node" x="310" y="164" width="200" height="76" rx="12"/>
  <text class="text" x="410" y="194" text-anchor="middle">T1 审批通过</text>
  <text class="tiny" x="410" y="214" text-anchor="middle">责任：审批人/系统</text>
  <text class="tiny" x="410" y="232" text-anchor="middle">输出：状态=APPROVED</text>

  <rect class="node" x="510" y="164" width="200" height="76" rx="12"/>
  <text class="text" x="610" y="194" text-anchor="middle">T2 执行开始</text>
  <text class="tiny" x="610" y="214" text-anchor="middle">输入：审批结果/资源</text>
  <text class="tiny" x="610" y="232" text-anchor="middle">输出：状态=RUNNING</text>

  <rect class="node" x="710" y="164" width="200" height="76" rx="12"/>
  <text class="text" x="810" y="194" text-anchor="middle">T3 结算完成</text>
  <text class="tiny" x="810" y="214" text-anchor="middle">触发：对账完成/回调</text>
  <text class="tiny" x="810" y="232" text-anchor="middle">输出：状态=SETTLED</text>

  <rect class="node" x="910" y="164" width="200" height="76" rx="12"/>
  <text class="text" x="1010" y="194" text-anchor="middle">T4 归档</text>
  <text class="tiny" x="1010" y="214" text-anchor="middle">条件：结算后+保留期</text>
  <text class="tiny" x="1010" y="232" text-anchor="middle">输出：状态=ARCHIVED</text>

  <rect class="span" x="560" y="116" width="260" height="16" rx="8"/>
  <text class="tiny" x="690" y="110" text-anchor="middle">时段：执行中（T2→T3）</text>

  <path class="edgeDash" d="M 340 140 C 360 220, 380 250, 420 310" marker-end="url(#arrow)"/>
  <path class="edgeDash" d="M 420 310 L 960 310" marker-end="url(#arrow)"/>
  <circle class="milestone" cx="420" cy="310" r="10"/>
  <circle class="milestone" cx="620" cy="310" r="10"/>
  <circle class="milestone" cx="820" cy="310" r="10"/>

  <rect class="node" x="390" y="334" width="210" height="70" rx="12"/>
  <text class="text" x="495" y="362" text-anchor="middle">异步通知</text>
  <text class="tiny" x="495" y="382" text-anchor="middle">MQ/回调/消息中心</text>

  <rect class="node" x="590" y="334" width="210" height="70" rx="12"/>
  <text class="text" x="695" y="362" text-anchor="middle">对账任务</text>
  <text class="tiny" x="695" y="382" text-anchor="middle">定时任务/补偿</text>

  <rect class="node" x="790" y="334" width="210" height="70" rx="12"/>
  <text class="text" x="895" y="362" text-anchor="middle">审计日志</text>
  <text class="tiny" x="895" y="382" text-anchor="middle">落库/可追溯</text>

  <text class="hint" x="60" y="468">图例：实线=主线；虚线=并行/异步；圆点=里程碑节点；条形 span=时间段。</text>
</svg>
