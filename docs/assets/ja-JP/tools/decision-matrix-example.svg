<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-label="決定行列の例">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .grid { stroke: #cbd5e1; stroke-width: 1; }
      .axis { fill: #0f172a; font: 600 16px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, "Noto Sans", "PingFang SC", "Hiragino Sans", "Microsoft YaHei", sans-serif; }
      .label { fill: #334155; font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, "Noto Sans", "PingFang SC", "Hiragino Sans", "Microsoft YaHei", sans-serif; }
      .cell { fill: #0f172a; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, "Noto Sans", "PingFang SC", "Hiragino Sans", "Microsoft YaHei", sans-serif; }
      .header { fill: #f1f5f9; }
      .corner { fill: #e2e8f0; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="920" height="420"/>

  <rect class="corner" x="40" y="40" width="180" height="70" rx="10"/>
  <rect class="header" x="220" y="40" width="660" height="70" rx="10"/>
  <rect class="header" x="40" y="110" width="180" height="270" rx="10"/>

  <line class="grid" x1="40" y1="40" x2="880" y2="40"/>
  <line class="grid" x1="40" y1="110" x2="880" y2="110"/>
  <line class="grid" x1="40" y1="200" x2="880" y2="200"/>
  <line class="grid" x1="40" y1="290" x2="880" y2="290"/>
  <line class="grid" x1="40" y1="380" x2="880" y2="380"/>

  <line class="grid" x1="40" y1="40" x2="40" y2="380"/>
  <line class="grid" x1="220" y1="40" x2="220" y2="380"/>
  <line class="grid" x1="440" y1="40" x2="440" y2="380"/>
  <line class="grid" x1="660" y1="40" x2="660" y2="380"/>
  <line class="grid" x1="880" y1="40" x2="880" y2="380"/>

  <text class="axis" x="60" y="85">操作 \\ 状態</text>
  <text class="axis" x="320" y="85">A</text>
  <text class="axis" x="540" y="85">B</text>
  <text class="axis" x="760" y="85">C</text>

  <text class="axis" x="110" y="165">1</text>
  <text class="axis" x="110" y="255">2</text>
  <text class="axis" x="110" y="345">3</text>

  <text class="label" x="140" y="165">送信</text>
  <text class="label" x="140" y="255">承認</text>
  <text class="label" x="140" y="345">取消</text>

  <text class="label" x="255" y="65">下書き</text>
  <text class="label" x="470" y="65">承認待ち</text>
  <text class="label" x="700" y="65">承認済み</text>

  <text class="cell" x="245" y="155">A1：許可</text>
  <text class="cell" x="245" y="175">ルール：draft_can_submit</text>

  <text class="cell" x="465" y="155">B1：拒否</text>
  <text class="cell" x="465" y="175">理由：既に送信済み</text>

  <text class="cell" x="685" y="155">C1：拒否</text>
  <text class="cell" x="685" y="175">理由：変更不可</text>

  <text class="cell" x="245" y="245">A2：拒否</text>
  <text class="cell" x="245" y="265">理由：承認待ちではない</text>

  <text class="cell" x="465" y="245">B2：許可</text>
  <text class="cell" x="465" y="265">ルール：RBAC &amp; クォータ</text>

  <text class="cell" x="685" y="245">C2：拒否</text>
  <text class="cell" x="685" y="265">理由：承認済み</text>

  <text class="cell" x="245" y="335">A3：許可</text>
  <text class="cell" x="245" y="355">ルール：draft_can_cancel</text>

  <text class="cell" x="465" y="335">B3：許可</text>
  <text class="cell" x="465" y="355">ルール：pending_can_cancel</text>

  <text class="cell" x="685" y="335">C3：拒否</text>
  <text class="cell" x="685" y="355">理由：取消不可</text>
</svg>
