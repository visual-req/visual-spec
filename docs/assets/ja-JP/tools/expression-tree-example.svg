<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-label="式ツリーの例">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .node { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.2; rx: 12; }
      .op { fill: #e0f2fe; stroke: #38bdf8; }
      .cmp { fill: #fef9c3; stroke: #facc15; }
      .leaf { fill: #ecfccb; stroke: #84cc16; }
      .text { fill: #0f172a; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, "Noto Sans", "PingFang SC", "Hiragino Sans", "Microsoft YaHei", sans-serif; }
      .title { fill: #0f172a; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, "Noto Sans", "PingFang SC", "Hiragino Sans", "Microsoft YaHei", sans-serif; }
      .edge { stroke: #64748b; stroke-width: 1.4; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="980" height="520"/>

  <line class="edge" x1="490" y1="90" x2="280" y2="160"/>
  <line class="edge" x1="490" y1="90" x2="700" y2="160"/>

  <line class="edge" x1="280" y1="210" x2="160" y2="290"/>
  <line class="edge" x1="280" y1="210" x2="400" y2="290"/>

  <line class="edge" x1="700" y1="210" x2="600" y2="290"/>
  <line class="edge" x1="700" y1="210" x2="820" y2="290"/>

  <rect class="node op" x="410" y="40" width="160" height="60" rx="12"/>
  <text class="title" x="490" y="66" text-anchor="middle">OR（または）</text>
  <text class="text" x="490" y="86" text-anchor="middle">子が1つでも真</text>

  <rect class="node op" x="200" y="160" width="160" height="60" rx="12"/>
  <text class="title" x="280" y="186" text-anchor="middle">AND（かつ）</text>
  <text class="text" x="280" y="206" text-anchor="middle">子がすべて真</text>

  <rect class="node op" x="620" y="160" width="160" height="60" rx="12"/>
  <text class="title" x="700" y="186" text-anchor="middle">AND（かつ）</text>
  <text class="text" x="700" y="206" text-anchor="middle">子がすべて真</text>

  <rect class="node cmp" x="70" y="290" width="180" height="70" rx="12"/>
  <text class="title" x="160" y="318" text-anchor="middle">&gt;=</text>
  <text class="text" x="160" y="340" text-anchor="middle">年齢 &gt;= 18</text>

  <rect class="node cmp" x="310" y="290" width="180" height="70" rx="12"/>
  <text class="title" x="400" y="318" text-anchor="middle">IN</text>
  <text class="text" x="400" y="340" text-anchor="middle">国 in {US, CA}</text>

  <rect class="node cmp" x="510" y="290" width="180" height="70" rx="12"/>
  <text class="title" x="600" y="318" text-anchor="middle">=</text>
  <text class="text" x="600" y="340" text-anchor="middle">VIP = true</text>

  <rect class="node cmp" x="730" y="290" width="180" height="70" rx="12"/>
  <text class="title" x="820" y="318" text-anchor="middle">&gt;</text>
  <text class="text" x="820" y="340" text-anchor="middle">残高 &gt; 1000</text>

  <rect class="node leaf" x="70" y="400" width="840" height="90" rx="12"/>
  <text class="title" x="90" y="430">リーフの対応（データ追跡）</text>
  <text class="text" x="90" y="454">age（年齢）: user.profile.age  |  country（国）: user.profile.country  |  vip（VIP）: user.tags.vip  |  balance（残高）: wallet.available_balance</text>
  <text class="text" x="90" y="476">定数：18, {US, CA}, true, 1000</text>
</svg>
