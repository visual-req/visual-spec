<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="640" viewBox="0 0 1180 640" role="img" aria-label="関税・輸入税の式例">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .box { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.2; rx: 12; }
      .group { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; rx: 14; }
      .title { fill: #0f172a; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, "Noto Sans", "PingFang SC", "Hiragino Sans", "Microsoft YaHei", sans-serif; }
      .text { fill: #0f172a; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, "Noto Sans", "PingFang SC", "Hiragino Sans", "Microsoft YaHei", sans-serif; }
      .muted { fill: #334155; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, "Noto Sans", "PingFang SC", "Hiragino Sans", "Microsoft YaHei", sans-serif; }
      .edge { stroke: #64748b; stroke-width: 1.6; fill: none; }
      .arrow { fill: #64748b; }
      .pill { fill: #e0f2fe; stroke: #38bdf8; stroke-width: 1.2; rx: 14; }
      .pill2 { fill: #ecfccb; stroke: #84cc16; stroke-width: 1.2; rx: 14; }
      .warn { fill: #fef9c3; stroke: #facc15; stroke-width: 1.2; rx: 14; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path class="arrow" d="M 0 0 L 10 5 L 0 10 z"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1180" height="640"/>

  <text class="title" x="40" y="46">例：関税/輸入税計算（式の分解）</text>
  <text class="muted" x="40" y="70">構成要素と依存関係、および各項が最終支払額にどう影響するかを示す。</text>

  <rect class="group" x="40" y="100" width="520" height="240" rx="14"/>
  <text class="title" x="60" y="130">入力</text>

  <rect class="box pill" x="60" y="150" width="220" height="54" rx="14"/>
  <text class="text" x="170" y="182" text-anchor="middle">FOB</text>
  <text class="muted" x="170" y="200" text-anchor="middle">物品価格（外貨）</text>

  <rect class="box pill" x="300" y="150" width="240" height="54" rx="14"/>
  <text class="text" x="420" y="182" text-anchor="middle">運賃</text>
  <text class="muted" x="420" y="200" text-anchor="middle">輸送費</text>

  <rect class="box pill" x="60" y="220" width="220" height="54" rx="14"/>
  <text class="text" x="170" y="252" text-anchor="middle">保険料</text>
  <text class="muted" x="170" y="270" text-anchor="middle">保険料</text>

  <rect class="box pill" x="300" y="220" width="240" height="54" rx="14"/>
  <text class="text" x="420" y="252" text-anchor="middle">FX</text>
  <text class="muted" x="420" y="270" text-anchor="middle">為替レート</text>

  <rect class="box warn" x="60" y="290" width="480" height="38" rx="14"/>
  <text class="muted" x="80" y="314">税率：duty_rate, vat_rate, consumption_rate（HSコード/政策による）</text>

  <rect class="group" x="620" y="100" width="520" height="130" rx="14"/>
  <text class="title" x="640" y="130">手順 1</text>
  <rect class="box pill2" x="640" y="150" width="480" height="62" rx="14"/>
  <text class="text" x="880" y="178" text-anchor="middle">CIF = (FOB + Freight + Insurance) × FX</text>
  <text class="muted" x="880" y="198" text-anchor="middle">現地通貨の課税標準</text>

  <rect class="group" x="620" y="250" width="520" height="120" rx="14"/>
  <text class="title" x="640" y="280">手順 2</text>
  <rect class="box" x="640" y="296" width="480" height="62" rx="14"/>
  <text class="text" x="880" y="324" text-anchor="middle">Duty = CIF × duty_rate</text>
  <text class="muted" x="880" y="344" text-anchor="middle">関税</text>

  <rect class="group" x="40" y="360" width="520" height="170" rx="14"/>
  <text class="title" x="60" y="390">手順 3（任意、品目による）</text>
  <rect class="box" x="60" y="410" width="480" height="92" rx="14"/>
  <text class="text" x="300" y="438" text-anchor="middle">ConsumptionTax = (CIF + Duty) × consumption_rate</text>
  <text class="muted" x="300" y="458" text-anchor="middle">例：消費税</text>
  <text class="muted" x="300" y="478" text-anchor="middle">適用外なら：consumption_rate = 0</text>

  <rect class="group" x="620" y="390" width="520" height="140" rx="14"/>
  <text class="title" x="640" y="420">手順 4</text>
  <rect class="box" x="640" y="436" width="480" height="78" rx="14"/>
  <text class="text" x="880" y="464" text-anchor="middle">VAT = (CIF + Duty + ConsumptionTax) × vat_rate</text>
  <text class="muted" x="880" y="484" text-anchor="middle">付加価値税</text>

  <rect class="box pill2" x="320" y="550" width="540" height="66" rx="14"/>
  <text class="title" x="590" y="578" text-anchor="middle">支払合計 = Duty + ConsumptionTax + VAT</text>
  <text class="muted" x="590" y="598" text-anchor="middle">サービス料/通関手数料は除外（該当する場合）</text>

  <path class="edge" d="M280 177 L620 177" marker-end="url(#arrow)"/>
  <path class="edge" d="M540 177 L620 177" marker-end="url(#arrow)"/>
  <path class="edge" d="M280 247 L620 177" marker-end="url(#arrow)"/>
  <path class="edge" d="M540 247 L620 177" marker-end="url(#arrow)"/>

  <path class="edge" d="M880 212 L880 296" marker-end="url(#arrow)"/>
  <path class="edge" d="M880 358 L880 436" marker-end="url(#arrow)"/>

  <path class="edge" d="M560 456 L640 456" marker-end="url(#arrow)"/>
  <path class="edge" d="M880 514 L880 550" marker-end="url(#arrow)"/>
  <path class="edge" d="M300 502 L300 583 L320 583" marker-end="url(#arrow)"/>
  <path class="edge" d="M880 358 L300 358 L300 410" marker-end="url(#arrow)"/>
</svg>
