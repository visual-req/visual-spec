<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360">
  <defs>
    <style>
      .bg{fill:#ffffff}
      .card{fill:#f8fafc;stroke:#e5e7eb;stroke-width:2}
      .title{font:700 18px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;fill:#111827}
      .muted{font:500 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;fill:#6b7280}
      .cell{fill:#ffffff;stroke:#e5e7eb;stroke-width:2}
      .head{fill:#eff6ff;stroke:#bfdbfe;stroke-width:2}
      .tag{fill:#ecfdf5;stroke:#a7f3d0;stroke-width:2}
      .text{font:700 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;fill:#111827}
      .text2{font:600 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;fill:#374151}
      .hint{font:500 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;fill:#2563eb}
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="960" height="360"/>
  <text class="title" x="40" y="56">多様性思考（Diversity）</text>
  <text class="muted" x="40" y="80">ロール × チャネル × 組織スコープ × UI差分の「変化」を起点に網羅する</text>

  <rect class="card" x="40" y="104" width="880" height="216" rx="16"/>

  <rect class="head" x="96" y="140" width="180" height="46" rx="10"/>
  <text class="text" x="186" y="168" text-anchor="middle">ロール</text>
  <rect class="head" x="286" y="140" width="190" height="46" rx="10"/>
  <text class="text" x="381" y="168" text-anchor="middle">チャネル/端末</text>
  <rect class="head" x="486" y="140" width="190" height="46" rx="10"/>
  <text class="text" x="581" y="168" text-anchor="middle">組織/範囲</text>
  <rect class="head" x="686" y="140" width="190" height="46" rx="10"/>
  <text class="text" x="781" y="168" text-anchor="middle">差分</text>

  <rect class="cell" x="96" y="196" width="180" height="52" rx="10"/>
  <text class="text2" x="186" y="226" text-anchor="middle">従業員 / オペレーター / 管理者</text>
  <rect class="cell" x="286" y="196" width="190" height="52" rx="10"/>
  <text class="text2" x="381" y="226" text-anchor="middle">Web / Mobile / API</text>
  <rect class="cell" x="486" y="196" width="190" height="52" rx="10"/>
  <text class="text2" x="581" y="226" text-anchor="middle">部門 / 地域 / テナント</text>
  <rect class="cell" x="686" y="196" width="190" height="52" rx="10"/>
  <text class="text2" x="781" y="218" text-anchor="middle">可視性 / 操作可否</text>
  <text class="text2" x="781" y="238" text-anchor="middle">既定値 / 指標</text>

  <rect class="tag" x="96" y="262" width="780" height="46" rx="12"/>
  <text class="hint" x="486" y="290" text-anchor="middle">差分は仕様に落とす：RBAC / データ権限 / UI操作 / バリデーション行列</text>
</svg>
