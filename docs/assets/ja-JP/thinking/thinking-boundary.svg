<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360">
  <defs>
    <style>
      .bg{fill:#ffffff}
      .card{fill:#f8fafc;stroke:#e5e7eb;stroke-width:2}
      .title{font:700 18px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;fill:#111827}
      .text{font:500 13px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;fill:#374151}
      .muted{font:500 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;fill:#6b7280}
      .pill{fill:#eff6ff;stroke:#bfdbfe;stroke-width:2}
      .pillText{font:700 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;fill:#1d4ed8}
      .line{stroke:#2563eb;stroke-width:3}
      .dash{stroke:#93c5fd;stroke-width:3;stroke-dasharray:8 6}
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="960" height="360"/>
  <rect class="card" x="140" y="64" width="680" height="232" rx="16"/>
  <text class="title" x="160" y="98">境界思考（Boundary）</text>
  <text class="muted" x="160" y="122">まず境界を引く：スコープ/非スコープ、適用/非適用の条件</text>

  <rect class="card" x="260" y="148" width="440" height="124" rx="14"/>
  <text class="title" x="282" y="180">スコープ</text>
  <text class="text" x="282" y="206">目的 / 非目的</text>
  <text class="text" x="282" y="228">含む / 含まない</text>
  <text class="text" x="282" y="250">境界条件：いつ適用 / いつ非適用</text>

  <rect class="pill" x="168" y="156" width="92" height="28" rx="14"/>
  <text class="pillText" x="214" y="175" text-anchor="middle">ロール</text>
  <rect class="pill" x="168" y="198" width="92" height="28" rx="14"/>
  <text class="pillText" x="214" y="217" text-anchor="middle">データ</text>
  <rect class="pill" x="168" y="240" width="92" height="28" rx="14"/>
  <text class="pillText" x="214" y="259" text-anchor="middle">時間</text>

  <rect class="pill" x="700" y="156" width="112" height="28" rx="14"/>
  <text class="pillText" x="756" y="175" text-anchor="middle">組織</text>
  <rect class="pill" x="700" y="198" width="112" height="28" rx="14"/>
  <text class="pillText" x="756" y="217" text-anchor="middle">権限</text>
  <rect class="pill" x="700" y="240" width="112" height="28" rx="14"/>
  <text class="pillText" x="756" y="259" text-anchor="middle">チャネル</text>

  <line class="dash" x1="260" y1="170" x2="260" y2="170"/>
  <line class="dash" x1="260" y1="212" x2="260" y2="212"/>
  <line class="dash" x1="260" y1="254" x2="260" y2="254"/>
  <line class="dash" x1="700" y1="170" x2="700" y2="170"/>
  <line class="dash" x1="700" y1="212" x2="700" y2="212"/>
  <line class="dash" x1="700" y1="254" x2="700" y2="254"/>

  <path class="line" d="M156 286 C250 320, 710 320, 804 286" fill="none"/>
  <text class="muted" x="480" y="336" text-anchor="middle">境界が明確になると、議論が「対立」から「合意と取捨選択」へ変わる</text>
</svg>
