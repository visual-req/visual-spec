<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="420" viewBox="0 0 1120 420" role="img" aria-label="Numbering Rules Example">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .seg { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.2; }
      .segA { fill: #e0f2fe; stroke: #38bdf8; }
      .segB { fill: #ecfccb; stroke: #84cc16; }
      .segC { fill: #fef9c3; stroke: #facc15; }
      .segD { fill: #fce7f3; stroke: #f472b6; }
      .text { fill: #0f172a; font: 14px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .title { fill: #0f172a; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, "Noto Sans", "PingFang SC", "Hiragino Sans", "Microsoft YaHei", sans-serif; }
      .hint { fill: #334155; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, "Noto Sans", "PingFang SC", "Hiragino Sans", "Microsoft YaHei", sans-serif; }
      .edge { stroke: #64748b; stroke-width: 1.4; fill: none; }
      .arrow { fill: #64748b; }
      .callout { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; rx: 10; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path class="arrow" d="M 0 0 L 10 5 L 0 10 z"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1120" height="420"/>
  <text class="title" x="40" y="46">Numbering Rules: segment composition</text>
  <text class="hint" x="40" y="70">Example: PAY-20260512-000123-AZ</text>

  <!-- composed id -->
  <rect class="seg segA" x="40" y="110" width="160" height="56" rx="12"/>
  <text class="text" x="120" y="145" text-anchor="middle">PAY</text>

  <rect class="seg" x="200" y="110" width="24" height="56" rx="12"/>
  <text class="text" x="212" y="145" text-anchor="middle">-</text>

  <rect class="seg segB" x="224" y="110" width="200" height="56" rx="12"/>
  <text class="text" x="324" y="145" text-anchor="middle">20260512</text>

  <rect class="seg" x="424" y="110" width="24" height="56" rx="12"/>
  <text class="text" x="436" y="145" text-anchor="middle">-</text>

  <rect class="seg segC" x="448" y="110" width="220" height="56" rx="12"/>
  <text class="text" x="558" y="145" text-anchor="middle">000123</text>

  <rect class="seg" x="668" y="110" width="24" height="56" rx="12"/>
  <text class="text" x="680" y="145" text-anchor="middle">-</text>

  <rect class="seg segD" x="692" y="110" width="120" height="56" rx="12"/>
  <text class="text" x="752" y="145" text-anchor="middle">AZ</text>

  <!-- callouts -->
  <rect class="callout" x="40" y="220" width="250" height="88" rx="10"/>
  <text class="title" x="58" y="248">Prefix segment</text>
  <text class="hint" x="58" y="270">Meaning: doc type</text>
  <text class="hint" x="58" y="290">Values: PAY / REF / ORD ...</text>
  <path class="edge" d="M165 220 L120 166" marker-end="url(#arrow)"/>

  <rect class="callout" x="310" y="220" width="280" height="88" rx="10"/>
  <text class="title" x="328" y="248">Date segment</text>
  <text class="hint" x="328" y="270">Meaning: business date</text>
  <text class="hint" x="328" y="290">Format: YYYYMMDD</text>
  <path class="edge" d="M450 220 L324 166" marker-end="url(#arrow)"/>

  <rect class="callout" x="610" y="220" width="300" height="88" rx="10"/>
  <text class="title" x="628" y="248">Sequence segment</text>
  <text class="hint" x="628" y="270">Meaning: per-scope counter</text>
  <text class="hint" x="628" y="290">Width: 6 digits (zero padded)</text>
  <path class="edge" d="M740 220 L558 166" marker-end="url(#arrow)"/>

  <rect class="callout" x="930" y="220" width="170" height="88" rx="10"/>
  <text class="title" x="948" y="248">Partition</text>
  <text class="hint" x="948" y="270">Meaning: shard/site</text>
  <text class="hint" x="948" y="290">Values: AZ / BJ ...</text>
  <path class="edge" d="M970 220 L752 166" marker-end="url(#arrow)"/>

  <text class="hint" x="40" y="360">Notes: the final storage id should be generated server-side; prefix/date are for readability, sequence guarantees uniqueness within scope.</text>
</svg>
