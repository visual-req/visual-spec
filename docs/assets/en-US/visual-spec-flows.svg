<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="592" viewBox="0 0 1280 592">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .stepLine { stroke: #0b6bff; stroke-width: 4; stroke-linecap: round; }
      .stepDot { fill: #0b6bff; }
      .stepNum { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #ffffff; }
      .stepLabel { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: rgba(0, 0, 0, 0.85); }
      .iconCircle { fill: #ffffff; stroke: #0b6bff; stroke-width: 2.6; }
      .iconText { font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #0b6bff; }
      .arrow { stroke: #0b6bff; stroke-width: 3; fill: none; }
      .arrowLabel { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #0b6bff; }
    </style>
    <marker id="arrowHeadBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0b6bff"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="592"/>

  <g transform="translate(0 60)">
  <line class="stepLine" x1="180" y1="220" x2="360" y2="220"/>
  <line class="stepLine" x1="440" y1="220" x2="620" y2="220"/>
  <line class="stepLine" x1="700" y1="220" x2="880" y2="220"/>
  <line class="stepLine" x1="960" y1="220" x2="1140" y2="220"/>

  <circle class="stepDot" cx="140" cy="220" r="28"/>
  <text class="stepNum" x="140" y="227" text-anchor="middle">1</text>
  <text class="stepLabel" x="140" y="275" text-anchor="middle">Pre</text>

  <circle class="stepDot" cx="400" cy="220" r="28"/>
  <text class="stepNum" x="400" y="227" text-anchor="middle">2</text>
  <text class="stepLabel" x="400" y="275" text-anchor="middle">Request</text>

  <circle class="stepDot" cx="660" cy="220" r="28"/>
  <text class="stepNum" x="660" y="227" text-anchor="middle">3</text>
  <text class="stepLabel" x="660" y="275" text-anchor="middle">Approval</text>

  <circle class="stepDot" cx="920" cy="220" r="28"/>
  <text class="stepNum" x="920" y="227" text-anchor="middle">4</text>
  <text class="stepLabel" x="920" y="275" text-anchor="middle">Execution</text>
  <text class="arrowLabel" x="920" y="340" text-anchor="middle">Emergency Stop</text>
  <text class="arrowLabel" x="920" y="370" text-anchor="middle">Emergency Change</text>
  <text class="arrowLabel" x="920" y="400" text-anchor="middle">Conflict Resolution</text>

  <circle class="stepDot" cx="1180" cy="220" r="28"/>
  <text class="stepNum" x="1180" y="227" text-anchor="middle">5</text>
  <text class="stepLabel" x="1180" y="275" text-anchor="middle">Post</text>

  <circle class="iconCircle" cx="600" cy="220" r="14"/>
  <text class="iconText" x="600" y="226" text-anchor="middle">−</text>
  <circle class="iconCircle" cx="720" cy="220" r="14"/>
  <text class="iconText" x="720" y="226" text-anchor="middle">+</text>

  <circle class="iconCircle" cx="860" cy="220" r="14"/>
  <text class="iconText" x="860" y="226" text-anchor="middle">−</text>
  <circle class="iconCircle" cx="980" cy="220" r="14"/>
  <text class="iconText" x="980" y="226" text-anchor="middle">+</text>

  <path class="arrow" marker-end="url(#arrowHeadBlue)" d="M 540 70 L 500 210"/>
  <text class="arrowLabel" x="560" y="44" text-anchor="middle">Cancel</text>
  <text class="arrowLabel" x="560" y="66" text-anchor="middle">Change</text>
  <path class="arrow" marker-end="url(#arrowHeadBlue)" d="M 740 70 L 700 210"/>
  <text class="arrowLabel" x="760" y="44" text-anchor="middle">Cancel</text>
  <text class="arrowLabel" x="760" y="66" text-anchor="middle">Change</text>
  <path class="arrow" marker-end="url(#arrowHeadBlue)" d="M 980 70 L 940 210"/>
  <text class="arrowLabel" x="1000" y="44" text-anchor="middle">Reject</text>
  <text class="arrowLabel" x="1000" y="66" text-anchor="middle">Change</text>
  <path class="arrow" marker-end="url(#arrowHeadBlue)" d="M 620 378 L 580 238"/>
  <text class="arrowLabel" x="620" y="406" text-anchor="middle">Validate</text>
  <text class="arrowLabel" x="620" y="428" text-anchor="middle">Constraints</text>
  <path class="arrow" marker-end="url(#arrowHeadBlue)" d="M 840 378 L 800 238"/>
  <text class="arrowLabel" x="840" y="406" text-anchor="middle">Validate</text>
  <text class="arrowLabel" x="840" y="428" text-anchor="middle">Constraints</text>
  </g>
</svg>
